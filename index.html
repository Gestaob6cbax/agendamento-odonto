<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento Odontológico 2026 - CBA X</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --odonto-blue: #0a2c6d; --odonto-gold: #b8860b; --success-green: #28a745; --light-bg: #f0f2f5; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--light-bg); margin: 0; padding: 15px; color: #333; }
        
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 6px solid var(--odonto-blue); }
        
        header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        header img { width: 80px; height: auto; margin-bottom: 10px; }
        header h2 { color: var(--odonto-blue); text-transform: uppercase; font-size: 1.2rem; margin: 5px 0; }
        
        label { display: block; margin-top: 15px; font-weight: 700; color: #444; font-size: 0.75rem; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; margin-top: 6px; border: 1.5px solid #d1d9e6; border-radius: 8px; box-sizing: border-box; font-size: 16px; background: #fdfdfd; }
        input:focus, select:focus { border-color: var(--odonto-blue); outline: none; background: white; }
        
        button { background: var(--odonto-blue); color: white; border: none; padding: 16px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 25px; font-size: 1rem; transition: 0.3s; }
        button:hover { background: #082152; transform: translateY(-2px); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        .success-box { display: none; text-align: center; padding: 20px; }
        .footer-logo { font-size: 0.7rem; color: #999; margin-top: 25px; text-align: center; font-weight: 600; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
        .loading-spinner { color: var(--odonto-blue); font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="form-area">
    <header>
        <img src="https://raw.githubusercontent.com/Gestaob6cbax/INSPECAO-ODONTOLOGICA-CBA-X-2026/main/logo.png" alt="Logo CBA X">
        <h2>Agendamento 2026</h2>
        <p style="color: #666; font-size: 0.8rem; margin: 0;">CBA X - Comando de Bombeiros de Área</p>
    </header>

    <label>Posto/Graduação:</label>
    <select id="posto">
        <option value="">Selecione...</option>
        <option>SD BM</option><option>CB BM</option><option>3º SGT BM</option>
        <option>2º SGT BM</option><option>1º SGT BM</option><option>SUBTEN BM</option>
        <option>2º TEN BM</option><option>1º TEN BM</option><option>CAP BM</option>
        <option>MAJ BM</option><option>TEN CEL BM</option><option>CEL BM</option>
    </select>

    <label>Nome Completo (Sem abreviações):</label>
    <input type="text" id="nome" oninput="this.value = this.value.toUpperCase()">

    <label>RG Militar:</label>
    <input type="number" id="rg" placeholder="Somente números">

    <label>Sua Unidade Atual:</label>
    <select id="unidadeServe">
        <option value="">Onde você serve?</option>
        <option>CBA X</option><option>1º GMAR</option><option>2º GMAR</option>
        <option>3º GMAR</option><option>4º GMAR</option><option>OUTRO</option>
    </select>

    <hr>

    <label>Local da Inspeção (Destino):</label>
    <select id="unidade" onchange="configurarAgenda()">
        <option value="">Escolha o local...</option>
        <option value="1GMAR">1º GMAR - BOTAFOGO</option>
        <option value="2GMAR">2º GMAR - BARRA (GBS)</option>
        <option value="3GMAR">3º GMAR - COPACABANA</option>
        <option value="4GMAR">4º GMAR - ITAIPU (CEPO)</option>
    </select>

    <label>Data Escolhida:</label>
    <input type="date" id="data" onchange="validarDataESlots()" disabled>

    <label>Horários Disponíveis:</label>
    <select id="horario" disabled>
        <option value="">Selecione o local e data...</option>
    </select>
    <div id="statusVagas" class="loading-spinner"></div>

    <button id="btnSalvar" onclick="salvar()">Confirmar Agendamento</button>
    <div class="footer-logo">SISTEMA DE GESTÃO CBA X</div>
</div>

<div class="container success-box" id="success-area">
    <h2 style="color: var(--success-green);">✅ Agendamento Confirmado!</h2>
    <div id="resumo" style="text-align: left; background: #f9fbfd; padding: 15px; border-radius: 10px; margin: 15px 0; font-size: 14px; border-left: 5px solid var(--success-green);"></div>
    <button onclick="location.reload()" style="background: #666;">Fazer Novo Agendamento</button>
</div>

<script>
// CONFIGURAÇÃO OFICIAL DE DATAS E SLOTS
const agendaConfig = {
    "1GMAR": { 
        datas: ["2026-03-11", "2026-03-18", "2026-03-25", "2026-04-01", "2026-04-08", "2026-05-06", "2026-05-13", "2026-05-20", "2026-05-27", "2026-06-03", "2026-06-10", "2026-06-17", "2026-06-24", "2026-07-01", "2026-07-08", "2026-07-15", "2026-07-22", "2026-07-29"],
        horarios: ["08:00", "08:15", "08:30", "08:45", "09:00", "09:15", "09:30", "09:45", "10:00", "10:15", "10:30", "10:45", "11:00", "11:15"]
    },
    "2GMAR": { 
        datas: ["2026-03-10", "2026-03-17", "2026-03-24", "2026-03-31", "2026-04-28", "2026-05-05", "2026-05-12", "2026-05-19", "2026-05-26", "2026-06-02", "2026-06-09", "2026-06-16", "2026-06-23", "2026-06-30", "2026-07-07", "2026-07-14", "2026-07-21", "2026-07-28"],
        horarios: ["08:00", "08:15", "08:30", "08:45", "09:00", "09:15", "09:30", "09:45", "10:00", "10:15", "10:30", "10:45", "11:00", "11:15", "13:00", "13:15", "13:30", "13:45", "14:00", "14:15", "14:30"]
    },
    "3GMAR": { 
        datas: ["2026-03-10", "2026-03-17", "2026-03-24", "2026-03-31", "2026-04-07", "2026-04-14", "2026-04-28", "2026-05-05", "2026-05-12", "2026-05-19", "2026-05-26", "2026-06-02", "2026-06-09", "2026-06-16", "2026-06-23", "2026-06-30", "2026-07-07", "2026-07-14", "2026-07-21", "2026-07-28"],
        horarios: ["08:00", "08:15", "08:30", "08:45", "09:00", "09:15", "09:30", "09:45", "10:00", "10:15", "10:30"]
    },
    "4GMAR": { 
        datas: ["2026-04-10", "2026-04-17", "2026-05-08", "2026-05-15", "2026-05-22", "2026-05-29", "2026-06-05", "2026-06-12", "2026-06-19", "2026-06-26", "2026-07-03", "2026-07-10", "2026-07-17", "2026-07-24", "2026-07-31"],
        horarios: ["08:00", "08:15", "08:30", "08:45", "09:00", "09:15", "09:30", "09:45", "10:00", "10:15", "10:30", "10:45", "11:00"]
    }
};

// FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyD3Z8mJPvGrRzwpYLymAXYcRQat2ccUqVM",
    authDomain: "agendamento-odonto-cbax.firebaseapp.com",
    projectId: "agendamento-odonto-cbax",
    storageBucket: "agendamento-odonto-cbax.firebasestorage.app",
    messagingSenderId: "545212689993",
    appId: "1:545212689993:web:b4b85a03bb2dcac9739998"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function configurarAgenda() {
    const local = document.getElementById("unidade").value;
    const campoData = document.getElementById("data");
    campoData.value = "";
    document.getElementById("horario").disabled = true;
    if (local) { campoData.disabled = false; }
}

async function validarDataESlots() {
    const local = document.getElementById("unidade").value;
    const dataSel = document.getElementById("data").value;
    const campoHora = document.getElementById("horario");
    const status = document.getElementById("statusVagas");

    if (!agendaConfig[local].datas.includes(dataSel)) {
        alert("⚠️ Data fora da escala desta unidade!");
        document.getElementById("data").value = "";
        return;
    }

    status.innerText = "🔍 Consultando vagas reais...";
    campoHora.disabled = true;

    try {
        const dataBR = dataSel.split('-').reverse().join('/');
        const snapshot = await db.collection("agendamentos")
                                 .where("unidade", "==", local)
                                 .where("data", "==", dataBR).get();
        
        const ocupados = [];
        snapshot.forEach(doc => ocupados.push(doc.data().horario));

        const disponiveis = agendaConfig[local].horarios.filter(h => !ocupados.includes(h));

        campoHora.innerHTML = '<option value="">Escolha o horário...</option>';
        if (disponiveis.length === 0) {
            status.innerText = "❌ Vagas esgotadas para este dia.";
        } else {
            status.innerText = `✅ ${disponiveis.length} horários livres.`;
            campoHora.disabled = false;
            disponiveis.forEach(h => campoHora.innerHTML += `<option value="${h}">${h}</option>`);
        }
    } catch (e) { status.innerText = "Erro ao carregar vagas."; }
}

async function salvar() {
    const btn = document.getElementById('btnSalvar');
    const d = {
        posto: document.getElementById('posto').value,
        nome: document.getElementById('nome').value.trim(),
        rg: document.getElementById('rg').value.trim(),
        unidadeServe: document.getElementById('unidadeServe').value,
        unidade: document.getElementById('unidade').value,
        dataRaw: document.getElementById('data').value,
        horario: document.getElementById('horario').value
    };

    if (Object.values(d).some(v => !v)) return alert("Preencha todos os campos!");

    btn.disabled = true; btn.innerText = "Salvando...";

    try {
        const rgExiste = await db.collection("agendamentos").where("rg", "==", d.rg).get();
        if (!rgExiste.empty) {
            btn.disabled = false; btn.innerText = "Confirmar Agendamento";
            return alert("🚨 RG já agendado!");
        }

        const payload = {
            ...d,
            data: d.dataRaw.split('-').reverse().join('/'),
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        await db.collection("agendamentos").add(payload);
        document.getElementById('form-area').style.display = 'none';
        document.getElementById('success-area').style.display = 'block';
        document.getElementById('resumo').innerHTML = `
            <b>Militar:</b> ${payload.posto} ${payload.nome}<br>
            <b>Local:</b> ${payload.unidade}<br>
            <b>Data/Hora:</b> ${payload.data} às ${payload.horario}
        `;
    } catch (e) { alert("Erro: " + e.message); btn.disabled = false; }
}
</script>
</body>
</html>
