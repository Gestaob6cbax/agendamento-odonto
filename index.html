<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento Odontológico 2026 - CBA X</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { color: #0056b3; text-align: center; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select, button { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #0056b3; color: white; border: none; font-size: 16px; cursor: pointer; margin-top: 20px; }
        button:hover { background: #004494; }
        .success-msg { color: green; font-weight: bold; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="container" id="agendamento-form">
    <img src="https://raw.githubusercontent.com/gestaob6cbax/INSPECAO-MEDICA-CBA-X-2026/main/logo_cba_x.png" style="width: 80px; display: block; margin: auto;">
    <h2>Agendamento Odontológico 2026</h2>
    
    <label>Posto/Graduação:</label>
    <select id="posto">
        <option value="SD">Soldado</option>
        <option value="CB">Cabo</option>
        <option value="3SGT">3º Sargento</option>
        <option value="2SGT">2º Sargento</option>
        <option value="1SGT">1º Sargento</option>
        <option value="SUBTEN">Subtenente</option>
        <option value="TEN">Oficial</option>
    </select>

    <label>Nome Completo:</label>
    <input type="text" id="nome" placeholder="Nome completo">

    <label>RG Militar:</label>
    <input type="number" id="rg" placeholder="Somente números">

    <label>Unidade:</label>
    <select id="unidade">
        <option value="1GMAR">1º GMAR</option>
        <option value="2GMAR">2º GMAR</option>
        <option value="3GMAR">3º GMAR</option>
        <option value="4GMAR">4º GMAR</option>
    </select>

    <label>Data:</label>
    <input type="date" id="data" onchange="verificarHorarios()">

    <label>Horário:</label>
    <select id="horario">
        <option value="">Selecione a data primeiro</option>
    </select>

    <button onclick="salvarAgendamento()">Confirmar Agendamento</button>
    <p class="success-msg" id="msg">Agendamento realizado com sucesso!</p>
</div>

<script>
    // Configurações do seu Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
        authDomain: "inspecao-saude-cbax.firebaseapp.com",
        projectId: "inspecao-saude-cbax",
        storageBucket: "inspecao-saude-cbax.firebasestorage.app",
        appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const horariosPadrao = ["08:00", "09:00", "10:00", "11:00", "13:00", "14:00", "15:00"];

    async function verificarHorarios() {
        const dataSel = document.getElementById('data').value;
        const selectHorario = document.getElementById('horario');
        selectHorario.innerHTML = '<option>Carregando...</option>';

        const snapshot = await db.collection("agendamentos_odonto")
            .where("data", "==", dataSel).get();
        
        const ocupados = snapshot.docs.map(doc => doc.data().horario);
        
        selectHorario.innerHTML = '';
        horariosPadrao.forEach(h => {
            if (!ocupados.includes(h)) {
                let opt = document.createElement('option');
                opt.value = h; opt.text = h;
                selectHorario.appendChild(opt);
            }
        });
    }

    async function salvarAgendamento() {
        const rg = document.getElementById('rg').value;
        const nome = document.getElementById('nome').value;
        const data = document.getElementById('data').value;
        const horario = document.getElementById('horario').value;

        if(!rg || !nome || !data || !horario) return alert("Preencha tudo!");

        // Verificação de RG duplicado
        const jaAgendou = await db.collection("agendamentos_odonto").where("rg", "==", rg).get();
        if(!jaAgendou.empty) return alert("Este RG já possui um agendamento!");

        const dados = {
            posto: document.getElementById('posto').value,
            nome: nome.toUpperCase(),
            rg: rg,
            unidade: document.getElementById('unidade').value,
            data: data,
            horario: horario,
            timestamp: new Date()
        };

        await db.collection("agendamentos_odonto").add(dados);
        
        document.getElementById('msg').style.display = 'block';
        gerarPDF(dados);
    }

    function gerarPDF(dados) {
        const element = document.body;
        const opt = {
            margin: 1,
            filename: `Comprovante_Odonto_${dados.rg}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(`
            <div style="text-align:center;">
                <img src="https://raw.githubusercontent.com/gestaob6cbax/INSPECAO-MEDICA-CBA-X-2026/main/logo_cba_x.png" width="100">
                <h1>Comprovante de Agendamento</h1>
                <p><b>Militar:</b> ${dados.posto} ${dados.nome}</p>
                <p><b>RG:</b> ${dados.rg}</p>
                <p><b>Data:</b> ${dados.data.split('-').reverse().join('/')}</p>
                <p><b>Horário:</b> ${dados.horario}</p>
                <p>CBA X - Atendimento Odontológico 2026</p>
            </div>
        `).save();
    }
</script>
</body>
</html>
