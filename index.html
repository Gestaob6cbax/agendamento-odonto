<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento Odontológico 2026 - CBA X</title>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f4f7f9; margin: 0; padding: 0; color: #1a1a1a; }
        header { background: #0a2c6d; color: white; text-align: center; padding: 30px 15px; border-bottom: 5px solid #082152; }
        header img { width: 80px; margin-bottom: 10px; }
        header h1 { font-size: 1.3rem; margin: 5px 0; }
        .container { background: white; width: 94%; max-width: 500px; margin: 20px auto; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { font-size: 1.1rem; color: #0a2c6d; border-bottom: 2px solid #eee; padding-bottom: 8px; margin-top: 25px; text-transform: uppercase; }
        label { font-weight: 600; margin-top: 15px; display: block; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; margin-top: 6px; border: 1px solid #ced4da; border-radius: 8px; font-size: 16px; }
        
        /* Contador Amarelo Estilo Inspeção */
        .info-vagas { background: #fff3cd; color: #856404; padding: 12px; border-radius: 8px; border: 1px solid #ffeeba; margin-top: 15px; font-size: 0.9rem; font-weight: bold; text-align: center; }
        
        .btn-principal { margin-top: 30px; padding: 18px; background: #063958; color: white; border: none; width: 100%; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .btn-principal:disabled { background: #ccc; cursor: not-allowed; }
        
        .info-row { margin-bottom: 10px; font-size: 1.1rem; border-bottom: 1px solid #f2f2f2; padding-bottom: 5px; }
        .info-label { font-weight: bold; color: #333; }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="Logo">
    <h1>Agendamento Odontológico 2026</h1>
    <p>Comando de Bombeiros de Área X</p>
</header>

<div class="container" id="formContainer">
    <h2>Dados do Militar</h2>
    <label>Posto/Graduação:</label>
    <select id="posto">
        <option value="">Selecione</option>
        <option>CEL BM</option><option>TC BM</option><option>MAJ BM</option><option>CAP BM</option><option>1º TEN BM</option><option>2º TEN BM</option><option>SUBTEN BM</option><option>1º SGT BM</option><option>2º SGT BM</option><option>3º SGT BM</option><option>CB BM</option><option>SD BM</option>
    </select>

    <label>Nome Completo:</label>
    <input type="text" id="nome" placeholder="Nome">
    <label>RG:</label>
    <input type="number" id="rg" placeholder="Somente números">
    <label>Telefone:</label>
    <input type="text" id="telefone" placeholder="(XX) XXXXX-XXXX">

    <h2>Agendamento</h2>
    <label>Unidade de Atendimento:</label>
    <select id="unidade" onchange="carregarDatas()">
        <option value="">Selecione</option>
