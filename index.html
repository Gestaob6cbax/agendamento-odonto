<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ADM - Odontologia 2026 - CBA X</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --odonto-cyan: #00838f; --cba-blue: #0a2c6d; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        header { background: var(--odonto-cyan); color: white; padding: 15px; text-align: center; border-bottom: 5px solid var(--cba-blue); }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        
        .stats-bar { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; flex: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 6px solid var(--odonto-cyan); text-align: center; }
        
        .controls { background: white; padding: 15px; border-radius: 10px; display: flex; gap: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input#lupa { flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th { background: #f1f3f4; padding: 15px; text-align: left; font-size: 12px; text-transform: uppercase; border-bottom: 2px solid #ddd; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        .btn-del { color: #d32f2f; cursor: pointer; border: 1px solid #ffcdd2; padding: 5px; border-radius: 5px; background: none; }
        
        .import-section { margin-top: 30px; padding: 20px; background: #e0f2f1; border: 2px dashed var(--odonto-cyan); border-radius: 10px; }
        textarea { width: 100%; height: 100px; margin-top: 10px; border-radius: 8px; padding: 10px; border: 1px solid #ccc; font-family: monospace; }
        .btn-import { background: var(--cba-blue); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h1>Painel ADM - Odontologia 2026</h1>
    <p>CBA X - CONTROLE DE VAGAS (14 MANHÃ / 7 TARDE)</p>
</header>

<div class="container">
    <div class="stats-bar">
        <div class="stat-card"><span>Total Odonto</span><br><strong id="cont-odonto" style="font-size:24px;">0</strong></div>
        <div class="stat-card"><span>Status</span><br><strong style="color:green">SISTEMA ATIVO</strong></div>
    </div>

    <div class="controls">
        <input type="text" id="lupa" placeholder="🔍 Buscar Militar ou RG na lista de Odonto..." onkeyup="filtrar()">
        <button onclick="carregarOdonto()" style="padding:10px; cursor:pointer; border-radius:8px;">🔄 Atualizar</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Data</th>
                <th>Turno</th>
                <th>Posto/Grad e Nome</th>
                <th>RG</th>
                <th style="text-align:center;">Ações</th>
            </tr>
        </thead>
        <tbody id="tabelaOdonto">
            <tr><td colspan="5" style="text-align:center; padding:20px;">Carregando agendamentos...</td></tr>
        </tbody>
    </table>

    <div class="import-section">
        <h3>📥 Sincronizar Agendamentos Antigos (Excel)</h3>
        <p style="font-size: 12px;">Cole: <b>Data | Turno | Unidade | Nome | RG</b></p>
        <textarea id="textoExcelOdonto" placeholder="Cole os dados da planilha de odontologia aqui..."></textarea>
        <button class="btn-import" onclick="importarDoExcel()">🚀 Sincronizar e Bloquear Vagas</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
        authDomain: "inspecao-saude-cbax.firebaseapp.com",
        projectId: "inspecao-saude-cbax",
        storageBucket: "inspecao-saude-cbax.firebasestorage.app",
        messagingSenderId: "1011281662526",
        appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function carregarOdonto() {
        const corpo = document.getElementById("tabelaOdonto");
        try {
            const snap = await db.collection("agendamentos_odonto").get();
            let lista = [];
            snap.forEach(doc => lista.push({id: doc.id, ...doc.data()}));

            // Ordenação por Data (Crescente)
            lista.sort((a,b) => {
                const da = a.data.split('/').reverse().join('');
                const db = b.data.split('/').reverse().join('');
                return da.localeCompare(db);
            });

            let html = "";
            lista.forEach(d => {
                html += `<tr>
                    <td><b>${d.data}</b></td>
                    <td>${d.turno}</td>
                    <td>${d.posto || ""} ${d.nome}</td>
                    <td><code>${d.rg}</code></td>
                    <td style="text-align:center;">
                        <button class="btn-del" onclick="excluirOdonto('${d.id}')">🗑️</button>
                    </td>
                </tr>`;
            });

            corpo.innerHTML = html || "<tr><td colspan='5' style='text-align:center;'>Nenhum registro.</td></tr>";
            document.getElementById("cont-odonto").innerText = lista.length;
        } catch (e) { console.error(e); }
    }

    async function importarDoExcel() {
        const raw = document.getElementById("textoExcelOdonto").value;
        if(!raw.trim()) return alert("Cole os dados primeiro!");
        
        const linhas = raw.split('\n');
        let count = 0;

        for(let l of linhas) {
            const c = l.split('\t');
            if(c.length >= 5) {
                await db.collection("agendamentos_odonto").add({
                    data: c[0].trim(),
                    turno: c[1].trim(),
                    unidade: c[2].trim(),
                    nome: c[3].trim().toUpperCase(),
                    rg: c[4].trim(),
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                count++;
            }
        }
        alert(count + " militares de Odonto sincronizados!");
        carregarOdonto();
        document.getElementById("textoExcelOdonto").value = "";
    }

    function filtrar() {
        const busca = document.getElementById("lupa").value.toUpperCase();
        const rows = document.querySelectorAll("#tabelaOdonto tr");
        rows.forEach(r => r.style.display = r.innerText.toUpperCase().includes(busca) ? "" : "none");
    }

    async function excluirOdonto(id) {
        if(confirm("Deseja excluir este agendamento odontológico?")) {
            await db.collection("agendamentos_odonto").doc(id).delete();
            carregarOdonto();
        }
    }

    window.onload = carregarOdonto;
</script>
</body>
</html>
