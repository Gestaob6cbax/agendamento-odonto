<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento Odontológico 2026 - CBA X</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --odonto-main: #009688;
            --cba-blue: #0a2c6d;
            --bg-light: #f1f4f8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 550px;
            padding-bottom: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid #ddd;
        }

        header { text-align: center; padding: 25px 15px; }
        header img { width: 75px; margin-bottom: 10px; }
        header h1 { color: var(--cba-blue); font-size: 1.5rem; margin: 0; text-transform: uppercase; }

        .block-header {
            background-color: var(--odonto-main);
            color: white;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            margin: 10px 15px;
            border-radius: 8px;
        }

        .form-section { padding: 0 20px; }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            font-size: 0.8rem;
            color: #444;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 11px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            background-color: #fafafa;
        }

        button {
            width: 100%;
            background: var(--odonto-main);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 25px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .confirmacao {
            margin: 20px 15px;
            padding: 20px;
            border-radius: 10px;
            display: none;
            text-align: center;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="logo.png" alt="Logo CBA X">
        <h1>Agendamento Odontológico</h1>
        <p>CBA X - 6ª Seção - Gestão 2026</p>
    </header>

    <div class="block-header">Bloco 1: Identificação do Militar</div>
    <div class="form-section">
       <label>Unidade que Serve:</label>
        <select id="unidadeServe">
            <option value="">Selecione...</option>
            <option>CBA X</option><option>CER X</option>
            <option>1º GMAR (Botafogo)</option><option>2º GMAR (Barra da Tijuca)</option>
            <option>3º GMAR (Copacabana)</option><option>4º GMAR (Itaipu)</option>
            <option>DBM 1/M (Paquetá)</option>
            <option>DBM 2/M (Piscinão de Ramos)</option>
            <option>DBM 3/M (Recreio)</option>
            <option>DBM 4/M (Barra de Guaratiba)</option>
            <option>DBM 5/M (Sepetiba)</option>
            <option>DBM 6/M (Itaipu)</option>
        </select>

        <label>Posto/Graduação:</label>
        <select id="posto">
            <option value="">Selecione...</option>
            <option>CEL BM</option><option>TC BM</option><option>MAJ BM</option>
            <option>CAP BM</option><option>1º TEN BM</option><option>2º TEN BM</option>
            <option>SUBTEN BM</option><option>1º SGT BM</option><option>2º SGT BM</option>
            <option>3º SGT BM</option><option>CB BM</option><option>SD BM</option>
        </select>

        <label>Nome Completo:</label>
        <input type="text" id="nome" placeholder="NOME COMPLETO" oninput="this.value = this.value.toUpperCase()">

        <label>RG Militar:</label>
        <input type="number" id="rg" placeholder="Somente números">

        <label>WhatsApp:</label>
        <input type="text" id="telefone" placeholder="(XX) 9XXXX-XXXX">

        <label>Email:</label>
        <input type="email" id="email" placeholder="militar@exemplo.com">
    </div>

    <div class="block-header">Bloco 2: Dados da Consulta</div>
    <div class="form-section">
        <label>Polo de Atendimento:</label>
        <select id="unidade" onchange="carregarDatas()">
            <option value="">Selecione o Polo...</option>
            <option value="1GMAR">1º GMAR - BOTAFOGO</option>
            <option value="2GMAR">2º GMAR - BARRA (GBS)</option>
            <option value="3GMAR">3º GMAR - COPACABANA</option>
            <option value="4º GMAR">CEPO(CHARITAS)</option>
        </select>

        <label>Data Disponível:</label>
        <select id="data" onchange="carregarHorarios()">
            <option value="">Selecione o polo primeiro</option>
        </select>

        <label>Horário:</label>
        <select id="horario">
            <option value="">Selecione a data primeiro</option>
        </select>

        <button onclick="salvar()" id="btnAcao">Confirmar Agendamento</button>
    </div>

    <div id="confirmacaoBox" class="confirmacao"></div>
</div>

<script>
    const { jsPDF } = window.jspdf;

    const firebaseConfig = {
        apiKey: "AIzaSyD3Z8mJPvGrRzwpYLymAXYcRQat2ccUqVM",
        authDomain: "agendamento-odonto-cbax.firebaseapp.com",
        projectId: "agendamento-odonto-cbax",
        storageBucket: "agendamento-odonto-cbax.firebasestorage.app",
        messagingSenderId: "545212689993",
        appId: "1:545212689993:web:b4b85a03bb2dcac9739998"
    };

    // Inicialização do Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const datas = {
        "1GMAR":["11/03/26","18/03/26","25/03/26","01/04/26","08/04/26","06/05/26","13/05/26","20/05/26","27/05/26","03/06/26","10/06/26","17/06/26","24/06/26","01/07/26","08/07/26","15/07/26","22/07/26","29/07/26"],
        "2GMAR":["10/03/26","17/03/26","24/03/26","31/03/26","28/04/26","05/05/26","12/05/26","19/05/26","26/05/26","02/06/26","09/06/26","16/06/26","23/06/26","30/06/26","07/07/26","14/07/26","21/07/26","28/07/26"],
        "3GMAR":["10/03/26","17/03/26","24/03/26","31/03/26","07/04/26","14/04/26","28/04/26","05/05/26","12/05/26","19/05/26","26/05/26","02/06/26","09/06/26","16/06/26","23/06/26","30/06/26","07/07/26","14/07/26","21/07/26","28/07/26"],
        "4GMAR":["10/04/26","17/04/26","08/05/26","15/05/26","22/05/26","29/05/26","05/06/26","12/06/26","19/06/26","26/06/26","03/07/26","10/07/26","17/07/26","24/07/26","31/07/26"]
    };

    function gerarHorarios(inicio, quantidade){
        let lista=[];
        let hora=new Date("2000-01-01T"+inicio+":00");
        for(let i=0;i<quantidade;i++){
            lista.push(hora.toTimeString().slice(0,5));
            hora.setMinutes(hora.getMinutes()+15);
        }
        return lista;
    }

    function carregarDatas(){
        let unidade=document.getElementById("unidade").value;
        let selectData=document.getElementById("data");
        let selectHorario=document.getElementById("horario");

        selectData.innerHTML="<option value=''>Selecione a data</option>";
        selectHorario.innerHTML="<option value=''>Selecione a data primeiro</option>";
        if(!unidade) return;

        datas[unidade].forEach(d=>{
            let op=document.createElement("option");
            op.value=d; op.text=d;
            selectData.appendChild(op);
        });
    }

    function carregarHorarios(){
        let unidade=document.getElementById("unidade").value;
        let selectHorario=document.getElementById("horario");
        selectHorario.innerHTML="<option value=''>Selecione o horário</option>";
        if(!unidade) return;

        let horarios=[];
        if(unidade==="1GMAR") horarios=gerarHorarios("08:00",14);
        if(unidade==="2GMAR") horarios=[...gerarHorarios("08:00",14),...gerarHorarios("13:00",7)];
        if(unidade==="3GMAR") horarios=gerarHorarios("08:00",11);
        if(unidade==="4GMAR") horarios=gerarHorarios("08:00",13);

        horarios.forEach(h=>{
            let op=document.createElement("option");
            op.value=h; op.text=h;
            selectHorario.appendChild(op);
        });
    }

    async function salvar(){
        let btn = document.getElementById("btnAcao");
        let rg = document.getElementById("rg").value.trim();
        let unidade = document.getElementById("unidade").value;
        let data = document.getElementById("data").value;
        let horario = document.getElementById("horario").value;

        if(!unidade||!data||!horario||!rg){
            alert("Preencha Unidade de Atendimento, Data, Horário e RG.");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Verificando...";

        try {
            // BLOQUEIO POR RG
            const consultaRG = await db.collection("agendamentos").where("rg","==",rg).get();
            if(!consultaRG.empty){
                alert("Já existe um agendamento para este RG.");
                btn.disabled = false; btn.innerText = "Confirmar Agendamento";
                return;
            }

            // BLOQUEIO DE HORÁRIO
            const consulta = await db.collection("agendamentos")
                .where("unidade","==",unidade)
                .where("data","==",data)
                .where("horario","==",horario)
                .get();

            if(!consulta.empty){
                alert("Este horário já foi preenchido por outro militar!");
                btn.disabled = false; btn.innerText = "Confirmar Agendamento";
                return;
            }

            let dados = {
                unidadeServe: document.getElementById("unidadeServe").value,
                posto: document.getElementById("posto").value,
                nome: document.getElementById("nome").value.toUpperCase(),
                rg: rg,
                telefone: document.getElementById("telefone").value,
                email: document.getElementById("email").value,
                unidade, data, horario,
                criadoEm: new Date()
            };

            await db.collection("agendamentos").add(dados);
            mostrarConfirmacao(dados);
            gerarPDF(dados);
            btn.style.display = "none";
            
            // Rola a tela para a confirmação
            window.scrollTo(0, document.body.scrollHeight);

        } catch (error) {
            alert("Erro ao salvar: " + error.message);
            btn.disabled = false;
            btn.innerText = "Confirmar Agendamento";
        }
    }

    function mostrarConfirmacao(d){
        let box=document.getElementById("confirmacaoBox");
        box.style.display="block";
        box.innerHTML=`
            <h3 style="margin-top:0;">Agendamento Confirmado!</h3>
            <p><strong>Militar:</strong> ${d.posto} ${d.nome}</p>
            <p><strong>Polo:</strong> ${d.unidade} | <strong>Data:</strong> ${d.data} às ${d.horario}</p>
            <p style="color:red; font-size:0.8rem; font-weight:bold;">O comprovante PDF foi baixado automaticamente.</p>
        `;
    }

    function gerarPDF(d){
        const doc = new jsPDF();
        doc.setFontSize(16);
        doc.text("CBA X - COMPROVANTE DE AGENDAMENTO 2026", 15, 20);
        doc.setFontSize(12);
        doc.text("----------------------------------------------------------", 15, 28);
        doc.text("Militar: " + d.posto + " " + d.nome, 15, 40);
        doc.text("RG: " + d.rg, 15, 50);
        doc.text("Polo de Atendimento: " + d.unidade, 15, 60);
        doc.text("Data: " + d.data, 15, 70);
        doc.text("Horário: " + d.horario, 15, 80);
        doc.text("----------------------------------------------------------", 15, 90);
        doc.setFontSize(10);
        doc.text("Emitido em: " + new Date().toLocaleString(), 15, 100);
        doc.save(`Agendamento_Odonto_${d.rg}.pdf`);
    }
</script>
</body>
</html>
