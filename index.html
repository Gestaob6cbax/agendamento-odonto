<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento Odontológico 2026 - CBA X</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --cba-blue: #0a2c6d; --cba-gold: #c5a059; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .premium-card { width: 100%; max-width: 480px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); border-top: 8px solid var(--cba-blue); }
        header { text-align: center; margin-bottom: 25px; }
        header img { width: 90px; }
        header h2 { color: var(--cba-blue); margin: 10px 0 5px; font-size: 1.3rem; text-transform: uppercase; }
        .section-title { background: var(--cba-blue); color: white; padding: 8px 15px; font-size: 0.75rem; font-weight: bold; border-radius: 5px; margin-top: 25px; text-transform: uppercase; text-align: center; }
        label { display: block; margin-top: 15px; font-weight: 700; color: #333; font-size: 0.75rem; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; margin-top: 6px; border: 2px solid #dfe4ea; border-radius: 10px; box-sizing: border-box; font-size: 16px; background-color: #fcfcfc; }
        
        .vagas-badge { margin-top: 10px; padding: 12px; border-radius: 10px; text-align: center; font-size: 0.9rem; font-weight: bold; display: none; border: 1px solid; }
        .vagas-ok { background: #e3f2fd; color: #0d47a1; border-color: #bbdefb; }
        .vagas-esgotado { background: #ffebee; color: #b71c1c; border-color: #ffcdd2; }

        .btn-confirmar { background: linear-gradient(135deg, var(--cba-blue) 0%, #061a41 100%); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 30px; font-size: 1.1rem; text-transform: uppercase; border-bottom: 3px solid var(--cba-gold); }
    </style>
</head>
<body>

<div class="premium-card">
    <header>
        <img src="https://raw.githubusercontent.com/gestaob6cbax/INSPECAO-MEDICA-CBA-X-2026/main/logo_cba_x.png" alt="CBA X">
        <h2>Agendamento Odontológico</h2>
        <p style="font-weight: bold; font-size: 0.8rem; color: #666;">CBA X - SAÚDE BUCAL 2026</p>
    </header>

    <div id="form-content">
        <div class="section-title">Identificação do Militar</div>
        <label>Posto / Graduação</label>
        <select id="posto">
            <option value="">Selecione...</option>
            <option>SD BM</option><option>CB BM</option><option>3º SGT BM</option><option>2º SGT BM</option><option>1º SGT BM</option><option>SUBTEN BM</option>
            <option>2º TEN BM</option><option>1º TEN BM</option><option>CAP BM</option><option>MAJ BM</option><option>TEN CEL BM</option><option>CEL BM</option>
        </select>
        <input type="text" id="nome" placeholder="NOME COMPLETO" oninput="this.value = this.value.toUpperCase()">
        <input type="number" id="rg" placeholder="RG MILITAR">
        <input type="tel" id="telefone" placeholder="TELEFONE (DDD + NÚMERO)">
        <input type="email" id="email" placeholder="E-MAIL">

        <div class="section-title">Local e Data</div>
        <label>Unidade de Atendimento</label>
        <select id="unidadeDestino" onchange="atualizarVagas()">
            <option value="">Selecione o GMAR...</option>
            <option value="1GMAR">1º GMAR - BOTAFOGO</option>
            <option value="CER/2ºGMAR">CER/2º GMAR - BARRA</option>
            <option value="3GMAR">3º GMAR - COPACABANA</option>
            <option value="4GMAR">4º GMAR - ITAIPU</option>
        </select>

        <label>Data da Consulta</label>
        <select id="data" onchange="atualizarVagas()">
            <option value="">Selecione a data...</option>
            <option>10/03/2026</option>
            <option>17/03/2026</option>
            <option>18/03/2026</option>
            <option>10/04/2026</option>
            <option>28/04/2026</option>
        </select>

        <div id="statusVagas" class="vagas-badge"></div>

        <button id="btnSalvar" class="btn-confirmar" onclick="salvar()">Confirmar Agendamento</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBwN3KGBafTjdGt9sz1GpWQcFlg7K8ljWM",
        authDomain: "inspecao-odontologica-cbax.firebaseapp.com",
        projectId: "inspecao-odontologica-cbax",
        storageBucket: "inspecao-odontologica-cbax.firebasestorage.app",
        messagingSenderId: "16343103868",
        appId: "1:16343103868:web:a386d9adcc48f818528cf9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function atualizarVagas() {
        const local = document.getElementById("unidadeDestino").value;
        const dataSel = document.getElementById("data").value;
        const badge = document.getElementById("statusVagas");

        if (!local || !dataSel) return;

        badge.style.display = "block";
        badge.innerText = "🔍 VERIFICANDO AGENDA...";

        try {
            const snapshot = await db.collection("agendamentos")
                .where("unidadeDestino", "==", local)
                .where("data", "==", dataSel)
                .get();

            const restam = 12 - snapshot.size;

            if (restam <= 0) {
                badge.innerText = "❌ AGENDA LOTADA";
                badge.className = "vagas-badge vagas-esgotado";
                document.getElementById("btnSalvar").disabled = true;
            } else {
                badge.innerText = `✅ ${restam} VAGAS DISPONÍVEIS`;
                badge.className = "vagas-badge vagas-ok";
                document.getElementById("btnSalvar").disabled = false;
            }
        } catch (e) {
            badge.innerText = "⚠️ ERRO AO CARREGAR VAGAS";
            console.error(e);
        }
    }

    async function salvar() {
        const d = {
            posto: document.getElementById("posto").value,
            nome: document.getElementById("nome").value.trim(),
            rg: document.getElementById("rg").value.trim(),
            telefone: document.getElementById("telefone").value.trim(),
            email: document.getElementById("email").value.trim().toLowerCase(),
            unidadeDestino: document.getElementById("unidadeDestino").value,
            data: document.getElementById("data").value,
            tipo: "ODONTOLOGIA",
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        if (Object.values(d).some(v => !v)) return alert("Preencha todos os campos, incluindo telefone e e-mail.");

        try {
            const check = await db.collection("agendamentos").where("rg", "==", d.rg).get();
            if (!check.empty) return alert("Já existe um agendamento para este RG!");

            await db.collection("agendamentos").add(d);
            alert("Agendamento Odontológico realizado com sucesso!");
            location.reload();
        } catch (e) { 
            alert("Erro ao salvar. Verifique se o Firestore está em 'Modo de Teste'."); 
        }
    }
</script>
</body>
</html>
