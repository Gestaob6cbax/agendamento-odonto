<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento Odontológico 2026 - CBA X</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <style>
        /* Mesma paleta de cores e estilo PREMIUM do seu ADM */
        :root { 
            --primary-blue: #0a2c6d; 
            --gold: #d4af37; /* Toque de ouro para premium */
            --bg-page: #dbe2ef; /* Azul acinzentado suave para o fundo */
            --bg-card: #ffffff; /* Fundo do formulário branco puro para contraste */
            --text-main: #0a2c6d;
            --text-label: #4a5568; /* Azul escuro suave para labels */
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-page); 
            margin: 0; padding: 20px; 
            color: #1a1a1a;
        }
        
        .container { 
            max-width: 580px; 
            margin: 40px auto; 
            background: var(--bg-card); 
            padding: 45px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(10, 44, 109, 0.15); /* Sombra azulada suave */
            border-top: 12px solid var(--primary-blue); 
            position: relative;
            overflow: hidden;
        }

        /* Detalhe Premium de Ouro */
        .container::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 5px;
            background: var(--gold);
        }
        
        header { text-align: center; margin-bottom: 35px; }
        header img { width: 90px; height: auto; margin-bottom: 12px; }
        header h2 { color: var(--text-main); margin: 0; text-transform: uppercase; letter-spacing: 1.5px; font-size: 22px; font-weight: 800; }
        header p { color: #666; font-size: 15px; margin: 5px 0 0; }

        label { 
            display: block; 
            margin-top: 20px; 
            font-size: 13px; 
            color: var(--text-label); 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }
        
        input, select { 
            width: 100%; 
            padding: 14px 18px; 
            margin-top: 8px; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            font-size: 16px; 
            outline: none; 
            transition: 0.3s; 
            box-sizing: border-box; 
            background: #f9f9f9; /* Fundo dos campos suave */
            color: #333;
        }
        
        input:focus, select:focus { 
            border-color: #7f9fdb; /* Borda azul mais clara ao focar */
            background: #ffffff; /* Fundo branco ao focar */
            box-shadow: 0 0 10px rgba(10, 44, 109, 0.1); 
        }

        button { 
            width: 100%; 
            padding: 18px; 
            background: var(--primary-blue); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: 800; 
            font-size: 17px; 
            cursor: pointer; 
            margin-top: 35px; 
            transition: 0.4s; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            box-shadow: 0 5px 15px rgba(10, 44, 109, 0.2);
        }
        
        button:hover { 
            background: #082152; 
            transform: translateY(-2px); 
            box-shadow: 0 8px 20px rgba(10, 44, 109, 0.3); 
        }

        .success-area { display: none; text-align: center; padding: 20px; }
        .success-icon { font-size: 60px; color: #28a745; margin-bottom: 20px; }
        
        .info-box { 
            background: #f8f9fa; 
            border-left: 5px solid var(--primary-blue); 
            padding: 20px; 
            text-align: left; 
            margin-top: 25px; 
            font-size: 15px; 
            line-height: 1.7; 
            border-radius: 8px;
            color: #333;
        }

        .footer { 
            text-align: center; 
            margin-top: 35px; 
            font-size: 12px; 
            color: #7f8c8d; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container" id="form-container">
    <header>
        <img src="logo.png" alt="Logo CBA X" onerror="this.style.display='none';">
        <h2>Agendamento Odontológico</h2>
        <p>Sistema de Saúde CBA X - Inspeção 2026</p>
    </header>

   <select id="posto" required>
            <option value="">Selecione seu Posto / Graduação</option>
            <option>SD BM</option><option>CB BM</option><option>3º SGT BM</option>
            <option>2º SGT BM</option><option>1º SGT BM</option><option>SUBTEN BM</option>
            <option>2º TEN BM</option><option>1º TEN BM</option><option>CAP BM</option>
            <option>MAJ BM</option><option>TEN CEL BM</option><option>CEL BM</option>
        </select>
        <label>Nome Completo (Sem abreviações):</label>
        <input type="text" id="nome" placeholder="NOME COMPLETO">
        <label>RG Militar:</label>
        <input type="number" id="rg" placeholder="Apenas números">
        <label>Unidade de Origem:</label>
    <select id="unidadeServe">
        <option value="">Selecione sua unidade...</option>
        <option>CBA X sed</option><option>1º GMAR</option><option>2º GMAR</option><option>3º GMAR</option>
        <option>4º GMAR</option><option>DBM 1/M</option><option>DBM 2/M</option><option>DBM 3/M</option>
        <option>DBM 4/M</option><option>DBM 5/M</option><option>DBM 6/M</option>
    </select>

    <label>Local do Atendimento (Destino)</label>
    <select id="unidade">
        <option value="">Selecione o local...</option>
        <option value="1GMAR">1º GMAR - BOTAFOGO</option>
        <option value="2GMAR">2º GMAR - BARRA (GBS)</option>
        <option value="3GMAR">3º GMAR - COPACABANA</option>
        <option value="4GMAR">4º GMAR - ITAIPU (CEPO)</option>
    </select>

    <label>Data Escolhida</label>
    <input type="date" id="data">

    <label>Horário</label>
    <select id="horario">
        <option value="">Selecione...</option>
        <option>08:00</option><option>09:00</option><option>10:00</option>
        <option>11:00</option><option>13:00</option><option>14:00</option><option>15:00</option>
    </select>

    <button onclick="enviarDados()">Confirmar Agendamento Premium</button>
    <div class="footer">CBA X - Comando de Bombeiros de Área</div>
</div>

<div class="container success-area" id="success-area">
    <div class="success-icon">✅</div>
    <h2>Agendamento Realizado!</h2>
    <p>Seus dados foram sincronizados com o Painel Administrativo do CBA X.</p>
    
    <div class="info-box" id="resumo"></div>
    
    <button onclick="location.reload()" style="background: #666; margin-top: 25px; box-shadow: none;">Realizar novo agendamento</button>
</div>

<script>
    // CONFIGURAÇÃO IDENTICA AO SEU ADM
    const firebaseConfig = {
        apiKey: "AIzaSyD3Z8mJPvGrRzwpYLymAXYcRQat2ccUqVM",
        authDomain: "agendamento-odonto-cbax.firebaseapp.com",
        projectId: "agendamento-odonto-cbax",
        storageBucket: "agendamento-odonto-cbax.firebasestorage.app",
        messagingSenderId: "545212689993",
        appId: "1:545212689993:web:b4b85a03bb2dcac9739998"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function enviarDados() {
        const rg = document.getElementById('rg').value;
        const nome = document.getElementById('nome').value.toUpperCase();
        const local = document.getElementById('unidade').value;
        const dataVal = document.getElementById('data').value;
        const horaVal = document.getElementById('horario').value;

        // Validação simples
        if(!rg || !nome || !local || !dataVal || !horaVal) {
            alert("Por favor, preencha todos os campos obrigatórios (Nome, RG, Local, Data e Hora).");
            return;
        }

        const dados = {
            nome: nome,
            rg: rg,
            posto: document.getElementById('posto').value,
            unidadeServe: document.getElementById('unidadeServe').value, // Origem
            unidade: local,                                            // Local (o que o ADM filtra)
            data: dataVal.split('-').reverse().join('/'),               // Converte para DD/MM/AAAA para o ADM
            horario: horaVal,
            timestamp: new Date()
        };

        try {
            // Verifica se o RG já existe para evitar duplicados
            const busca = await db.collection("agendamentos").where("rg", "==", rg).get();
            if(!busca.empty) {
                alert("ERRO: Este RG já possui um agendamento cadastrado!");
                return;
            }

            // Salva na coleção "agendamentos" (mesma do ADM)
            await db.collection("agendamentos").add(dados);
            
            // Exibe Sucesso
            document.getElementById('form-container').style.display = 'none';
            document.getElementById('success-area').style.display = 'block';
            document.getElementById('resumo').innerHTML = `
                <strong>Militar:</strong> ${dados.posto} ${dados.nome}<br>
                <strong>Local:</strong> ${dados.unidade}<br>
                <strong>Data/Hora:</strong> ${dados.data} às ${dados.horario}
            `;

        } catch (error) {
            alert("Erro ao salvar: " + error.message);
        }
    }
</script>
</body>
</html>
