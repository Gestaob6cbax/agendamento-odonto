<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento Odontológico 2026 - CBA X</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --primary-blue: #0a2c6d; 
            --gold: #d4af37;
            --bg-page: #dbe2ef;
            --bg-card: #ffffff;
            --text-main: #0a2c6d;
            --text-label: #4a5568;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-page); 
            margin: 0; padding: 20px; 
            color: #1a1a1a;
        }
        
        .container { 
            max-width: 580px; 
            margin: 40px auto; 
            background: var(--bg-card); 
            padding: 45px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(10, 44, 109, 0.15); 
            border-top: 12px solid var(--primary-blue); 
            position: relative;
            overflow: hidden;
        }

        .container::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 5px;
            background: var(--gold);
        }
        
        header { text-align: center; margin-bottom: 35px; }
        header h2 { color: var(--text-main); margin: 0; text-transform: uppercase; letter-spacing: 1.5px; font-size: 22px; font-weight: 800; }
        header p { color: #666; font-size: 15px; margin: 5px 0 0; }

        label { 
            display: block; 
            margin-top: 20px; 
            font-size: 13px; 
            color: var(--text-label); 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }
        
        input, select { 
            width: 100%; 
            padding: 14px 18px; 
            margin-top: 8px; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            font-size: 16px; 
            outline: none; 
            box-sizing: border-box; 
            background: #f9f9f9;
        }
        
        input:focus, select:focus { border-color: #7f9fdb; background: #ffffff; }

        button { 
            width: 100%; padding: 18px; 
            background: var(--primary-blue); 
            color: white; border: none; 
            border-radius: 12px; font-weight: 800; 
            font-size: 17px; cursor: pointer; 
            margin-top: 35px; text-transform: uppercase; 
            letter-spacing: 1.5px;
        }
        
        button:hover { background: #082152; transform: translateY(-2px); }

        .success-area { display: none; text-align: center; padding: 20px; }
        .success-icon { font-size: 60px; color: #28a745; margin-bottom: 20px; }
        .info-box { background: #f8f9fa; border-left: 5px solid var(--primary-blue); padding: 20px; text-align: left; margin-top: 25px; border-radius: 8px; }
        .footer { text-align: center; margin-top: 35px; font-size: 12px; color: #7f8c8d; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="form-container">
    <header>
        <h2>Agendamento Odontológico</h2>
        <p>Sistema de Saúde CBA X - Inspeção 2026</p>
    </header>

    <label>Posto / Graduação</label>
    <select id="posto">
        <option value="">Selecione...</option>
        <option>SD BM</option><option>CB BM</option><option>3º SGT BM</option>
        <option>2º SGT BM</option><option>1º SGT BM</option><option>SUBTEN BM</option>
        <option>2º TEN BM</option><option>1º TEN BM</option><option>CAP BM</option>
        <option>MAJ BM</option><option>TEN CEL BM</option><option>CEL BM</option>
    </select>

    <label>Nome Completo (Sem abreviações)</label>
    <input type="text" id="nome" placeholder="NOME COMPLETO">

    <label>RG Militar</label>
    <input type="number" id="rg" placeholder="Apenas números">

    <label>Unidade de Origem</label>
    <select id="unidadeServe">
        <option value="">Selecione sua unidade...</option>
        <option>CBA X sed</option><option>1º GMAR</option><option>2º GMAR</option><option>3º GMAR</option>
        <option>4º GMAR</option><option>DBM 1/M</option><option>DBM 2/M</option><option>DBM 3/M</option>
        <option>DBM 4/M</option><option>DBM 5/M</option><option>DBM 6/M</option>
    </select>

    <label>Local do Atendimento (Destino)</label>
    <select id="unidade" onchange="configurarAgenda()">
        <option value="">Selecione o local...</option>
        <option value="1GMAR">1º GMAR - BOTAFOGO (Quartas)</option>
        <option value="2GMAR">2º GMAR - BARRA (Terças)</option>
        <option value="3GMAR">3º GMAR - COPACABANA (Terças)</option>
        <option value="4GMAR">4º GMAR - ITAIPU (Sextas)</option>
    </select>

    <label>Data Escolhida</label>
    <input type="date" id="data" onchange="validarData()" disabled>
    <small id="avisoData" style="color: #666; font-size: 11px;">Selecione o local primeiro.</small>

    <label>Horário</label>
    <select id="horario" disabled>
        <option value="">Selecione a data primeiro...</option>
    </select>

    <button onclick="enviarDados()">Confirmar Agendamento Premium</button>
    <div class="footer">CBA X - Comando de Bombeiros de Área</div>
</div>

<div class="container success-area" id="success-area">
    <div class="success-icon">✅</div>
    <h2>Agendamento Realizado!</h2>
    <p>Seus dados foram sincronizados com o Painel Administrativo.</p>
    <div class="info-box" id="resumo"></div>
    <button onclick="location.reload()" style="background: #666; margin-top: 25px;">Realizar novo agendamento</button>
</div>

<script>
    // 1. CONFIGURAÇÃO FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyD3Z8mJPvGrRzwpYLymAXYcRQat2ccUqVM",
        authDomain: "agendamento-odonto-cbax.firebaseapp.com",
        projectId: "agendamento-odonto-cbax",
        storageBucket: "agendamento-odonto-cbax.firebasestorage.app",
        messagingSenderId: "545212689993",
        appId: "1:545212689993:web:b4b85a03bb2dcac9739998"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 2. CONFIGURAÇÃO DA AGENDA (Datas e Horários)
    const agendaConfig = {
        "1GMAR": {
            datas: ["2026-03-11", "2026-03-18", "2026-03-25", "2026-04-01", "2026-04-08", "2026-05-06", "2026-05-13", "2026-05-20", "2026-05-27", "2026-06-03", "2026-06-10", "2026-06-17", "2026-06-24", "2026-07-01", "2026-07-08", "2026-07-15", "2026-07-22", "2026-07-29"],
            horarios: ["08:00", "08:15", "08:30", "08:45", "09:00", "09:15", "09:30", "09:45", "10:00", "10:15", "10:30", "10:45", "11:00", "11:15"]
        },
        "2GMAR": {
            datas: ["2026-03-10", "2026-03-17", "2026-03-24", "2026-03-31", "2026-04-28", "2026-05-05", "2026-05-12", "2026-05-19", "2026-05-26", "2026-06-02", "2026-06-09", "2026-06-16", "2026-06-23", "2026-06-30", "2026-07-07", "2026-07-14", "2026-07-21", "2026-07-28"],
            horarios: ["08:00", "08:15", "08:30", "08:45", "09:00", "09:15", "09:30", "09:45", "10:00", "10:15", "10:30", "10:45", "11:00", "11:15", "13:00", "13:15", "13:30", "13:45", "14:00", "14:15", "14:30"]
        },
        "3GMAR": {
            datas: ["2026-03-10", "2026-03-17", "2026-03-24", "2026-03-31", "2026-04-07", "2026-04-14", "2026-04-28", "2026-05-05", "2026-05-12", "2026-05-19", "2026-05-26", "2026-06-02", "2026-06-09", "2026-06-16", "2026-06-23", "2026-06-30", "2026-07-07", "2026-07-14", "2026-07-21", "2026-07-28"],
            horarios: ["08:00", "08:15", "08:30", "08:45", "09:00", "09:15", "09:30", "09:45", "10:00", "10:15", "10:30"]
        },
        "4GMAR": {
            datas: ["2026-04-10", "2026-04-17", "2026-05-08", "2026-05-15", "2026-05-22", "2026-05-29", "2026-06-05", "2026-06-12", "2026-06-19", "2026-06-26", "2026-07-03", "2026-07-10", "2026-07-17", "2026-07-24", "2026-07-31"],
            horarios: ["08:00", "08:15", "08:30", "08:45", "09:00", "09:15", "09:30", "09:45", "10:00", "10:15", "10:30", "10:45", "11:00"]
        }
    };

    // 3. FUNÇÕES DE TELA
    function configurarAgenda() {
        const local = document.getElementById("unidade").value;
        const campoData = document.getElementById("data");
        const aviso = document.getElementById("avisoData");
        campoData.value = "";
        document.getElementById("horario").disabled = true;
        
        if (local) {
            campoData.disabled = false;
            aviso.innerText = "Escolha uma data permitida.";
        } else {
            campoData.disabled = true;
            aviso.innerText = "Selecione o local primeiro.";
        }
    }

    function validarData() {
        const local = document.getElementById("unidade").value;
        const dataSelecionada = document.getElementById("data").value;
        const campoHorario = document.getElementById("horario");
        
        if (!agendaConfig[local].datas.includes(dataSelecionada)) {
            alert("Atenção: Não há inspeção neste dia para o quartel selecionado.");
            document.getElementById("data").value = "";
            campoHorario.disabled = true;
            return;
        }

        campoHorario.disabled = false;
        campoHorario.innerHTML = '<option value="">Selecione o horário...</option>';
        agendaConfig[local].horarios.forEach(hora => {
            campoHorario.innerHTML += `<option value="${hora}">${hora}</option>`;
        });
    }

    // 4. ENVIO DE DADOS
    async function enviarDados() {
        const rg = document.getElementById('rg').value;
        const nome = document.getElementById('nome').value.toUpperCase();
        const local = document.getElementById('unidade').value;
        const dataVal = document.getElementById('data').value;
        const horaVal = document.getElementById('horario').value;
        const posto = document.getElementById('posto').value;
        const unidadeServe = document.getElementById('unidadeServe').value;

        if(!rg || !nome || !local || !dataVal || !horaVal || !posto) {
            alert("Preencha todos os campos!"); return;
        }

        const dados = {
            nome, rg, posto, unidadeServe, unidade: local,
            data: dataVal.split('-').reverse().join('/'),
            horario: horaVal, timestamp: new Date()
        };

        try {
            const busca = await db.collection("agendamentos").where("rg", "==", rg).get();
            if(!busca.empty) { alert("Este RG já possui agendamento!"); return; }

            await db.collection("agendamentos").add(dados);
            document.getElementById('form-container').style.display = 'none';
            document.getElementById('success-area').style.display = 'block';
            document.getElementById('resumo').innerHTML = `<strong>Militar:</strong> ${dados.posto} ${dados.nome}<br><strong>Local:</strong> ${dados.unidade}<br><strong>Data:</strong> ${dados.data} às ${dados.horario}`;
        } catch (error) { alert("Erro: " + error.message); }
    }
</script>
</body>
</html>
