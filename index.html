<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento Odontológico 2026 - CBA X</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --odonto-main: #009688; /* Verde Água da Odonto */
            --cba-blue: #0a2c6d;
            --bg-light: #f1f4f8;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            background: var(--white);
            width: 100%;
            max-width: 550px;
            padding-bottom: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid #ddd;
        }

        header { 
            text-align: center; 
            padding: 25px 15px;
        }
        header img { width: 75px; margin-bottom: 10px; }
        header h1 { color: var(--cba-blue); font-size: 1.5rem; margin: 0; text-transform: uppercase; }
        header p { color: #666; font-size: 0.9rem; margin-top: 5px; font-weight: bold; }

        /* Estilo das Faixas de Título (Igual Dermatologia) */
        .block-header {
            background-color: var(--odonto-main);
            color: white;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 10px 15px;
            border-radius: 8px;
        }

        .form-section {
            padding: 0 20px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            font-size: 0.8rem;
            color: #444;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 11px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            background-color: #fafafa;
        }

        input:focus, select:focus { 
            border-color: var(--odonto-main); 
            background-color: #fff; 
            box-shadow: 0 0 5px rgba(0,150,136,0.2); 
        }

        button {
            width: 100%;
            background: var(--odonto-main);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 25px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover { background: #00796b; }

        .confirmacao {
            margin: 20px 15px;
            padding: 20px;
            border-radius: 10px;
            display: none;
            text-align: center;
            font-weight: bold;
            border: 1px solid #c3e6cb;
        }

        .btn-print {
            background-color: var(--cba-blue);
            color: white;
            padding: 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="logo.png" alt="Logo CBA X">
        <h1>Agendamento Odontológico</h1>
        <p>CBA X - 6ª Seção (ADM) - Gestão 2026</p>
    </header>

    <div class="block-header">Bloco 1: Identificação do Militar</div>
    <div class="form-section">
        <label>Unidade que Serve:</label>
        <select id="unidadeServe">
            <option value="">Selecione...</option>
            <option>CBA X</option><option>CER X</option>
            <option>1º GMAR (Botafogo)</option><option>2º GMAR (Barra)</option>
            <option>3º GMAR (Copacabana)</option><option>4º GMAR (Itaipu)</option>
            <option>DBM 1/M (Paquetá)</option><option>DBM 2/M (Ramos)</option>
            <option>DBM 3/M (Recreio)</option><option>DBM 4/M (Guaratiba)</option>
            <option>DBM 5/M (Sepetiba)</option><option>DBM 6/M (Itaipu)</option>
        </select>

        <label>Posto/Graduação:</label>
        <select id="posto">
            <option value="">Selecione...</option>
            <option>CEL BM</option><option>TC BM</option><option>MAJ BM</option>
            <option>CAP BM</option><option>1º TEN BM</option><option>2º TEN BM</option>
            <option>SUBTEN BM</option><option>1º SGT BM</option><option>2º SGT BM</option>
            <option>3º SGT BM</option><option>CB BM</option><option>SD BM</option>
        </select>

        <label>Nome Completo:</label>
        <input type="text" id="nome" placeholder="Digite seu nome">

        <label>RG Militar:</label>
        <input type="number" id="rg" placeholder="Somente números">

        <label>Telefone/WhatsApp:</label>
        <input type="text" id="telefone" placeholder="(XX) 9XXXX-XXXX">

        <label>Email:</label>
        <input type="email" id="email" placeholder="militar@exemplo.com">
    </div>

    <div class="block-header">Bloco 2: Dados do Agendamento</div>
    <div class="form-section">
        <label>Polo de Atendimento:</label>
        <select id="unidade">
            <option value="">Selecione o Polo...</option>
            <option value="1º GMAR - BOTAFOGO">1º GMAR - BOTAFOGO</option>
            <option value="2º GMAR - BARRA (GBS)">2º GMAR - BARRA (GBS)</option>
            <option value="3º GMAR - COPACABANA">3º GMAR - COPACABANA</option>
            <option value="CEPO - POL DE CHARITAS (CEPO)">CEPO - NITERÓI</option>
        </select>

        <label>Data Escolhida:</label>
        <input type="date" id="data">

        <label>Horário/Turno:</label>
        <select id="horario">
            <option value="">Selecione...</option>
            <option>MANHÃ (08:00 às 12:00)</option>
            <option>TARDE (13:00 às 17:00)</option>
        </select>

        <button onclick="salvar()" id="btnAcao">Confirmar Agendamento</button>
    </div>

    <div id="confirmacaoBox" class="confirmacao"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
        authDomain: "agendamento-odonto-cbax.firebaseapp.com",
        projectId: "agendamento-odonto-cbax",
        storageBucket: "agendamento-odonto-cbax.firebasestorage.app",
        messagingSenderId: "1011281662526",
        appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let dadosParaImpressao = null;

    async function salvar() {
        const btn = document.getElementById("btnAcao");
        const box = document.getElementById("confirmacaoBox");

        const dados = {
            unidadeServe: document.getElementById("unidadeServe").value,
            posto: document.getElementById("posto").value,
            nome: document.getElementById("nome").value.toUpperCase(),
            rg: document.getElementById("rg").value,
            telefone: document.getElementById("telefone").value,
            email: document.getElementById("email").value,
            poloAtendimento: document.getElementById("unidade").value,
            data: document.getElementById("data").value,
            turno: document.getElementById("horario").value,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        if (!dados.nome || !dados.rg || !dados.data || !dados.unidadeServe || !dados.poloAtendimento) {
            alert("Por favor, preencha todos os campos obrigatórios.");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Processando...";

        try {
            await db.collection("agendamentos_odonto").add(dados);
            dadosParaImpressao = dados;
            
            box.style.display = "block";
            box.style.backgroundColor = "#d4edda";
            box.style.color = "#155724";
            box.innerHTML = `
                <p>✅ Agendamento realizado com sucesso!</p>
                <button class="btn-print" onclick="imprimirComprovante()">🖨️ Imprimir Comprovante</button>
            `;
            
            btn.style.display = "none";
        } catch (error) {
            console.error(error);
            alert("Erro ao salvar. Verifique sua conexão.");
            btn.disabled = false;
            btn.innerText = "Confirmar Agendamento";
        }
    }

    function imprimirComprovante() {
        if(!dadosParaImpressao) return;
        const dataFormatada = dadosParaImpressao.data.split('-').reverse().join('/');
        const win = window.open('', '', 'height=700,width=700');
        
        win.document.write(`
            <html>
            <head>
                <style>
                    body { font-family: sans-serif; padding: 40px; text-align: center; }
                    .box { border: 2px solid #0a2c6d; padding: 20px; border-radius: 12px; text-align: left; background: #f9f9f9; }
                    .header { text-align: center; border-bottom: 2px solid #0a2c6d; padding-bottom: 10px; margin-bottom: 20px; }
                    .label { font-weight: bold; color: #555; text-transform: uppercase; font-size: 12px; }
                    .val { font-size: 16px; font-weight: bold; margin-bottom: 12px; display: block; }
                </style>
            </head>
            <body>
                <div class="box">
                    <div class="header">
                        <strong>COMPROVANTE DE AGENDAMENTO ODONTOLÓGICO</strong><br>
                        CBA X - 6ª SEÇÃO
                    </div>
                    <span class="label">Militar:</span>
                    <span class="val">\${dadosParaImpressao.posto} \${dadosParaImpressao.nome}</span>
                    <span class="label">RG:</span>
                    <span class="val">\${dadosParaImpressao.rg}</span>
                    <span class="label">Local:</span>
                    <span class="val">\${dadosParaImpressao.poloAtendimento}</span>
                    <span class="label">Data/Turno:</span>
                    <span class="val">\${dataFormatada} - \${dadosParaImpressao.turno}</span>
                </div>
            </body>
            </html>
        `);
        win.document.close();
        setTimeout(() => { win.print(); }, 500);
    }
</script>

</body>
</html>
