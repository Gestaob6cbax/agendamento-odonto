<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odontologia 2026 - CBA X</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        :root { --cba-color: #009688; --cba-blue: #0a2c6d; } /* Cor verde água para Odonto */
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 10px; display: flex; justify-content: center; }
        .premium-card { width: 100%; max-width: 480px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--cba-color); }
        header { text-align: center; margin-bottom: 20px; }
        header img { width: 70px; margin-bottom: 10px; }
        header h2 { color: var(--cba-blue); font-size: 1.2rem; text-transform: uppercase; margin: 5px 0; }
        .section-title { background: var(--cba-color); color: white; padding: 8px; font-size: 0.7rem; font-weight: bold; border-radius: 5px; margin-top: 15px; text-transform: uppercase; text-align: center; }
        label { display: block; margin-top: 12px; font-weight: 700; color: #333; font-size: 0.65rem; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #dfe4ea; border-radius: 8px; box-sizing: border-box; font-size: 15px; background: #fcfcfc; outline: none; }
        input:focus, select:focus { border-color: var(--cba-color); }
        .btn-confirmar { background: var(--cba-color); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 25px; text-transform: uppercase; font-size: 1rem; transition: 0.3s; }
        #sucesso { display: none; text-align: center; }
        .caixa-confirmacao { border: 2px dashed var(--cba-color); padding: 20px; border-radius: 12px; margin: 15px 0; background: #fffdfd; }
        .nome-militar { color: var(--cba-blue); font-weight: 900; font-size: 1.1rem; text-transform: uppercase; }
        .link-outro { display:block; margin-top:15px; cursor:pointer; font-size:0.8rem; color:var(--cba-blue); text-decoration:underline; }
        
        @media print { 
            .btn-confirmar, .link-outro, #form-content, .section-title { display: none !important; } 
            .premium-card { border: none; box-shadow: none; width: 100%; } 
            #sucesso { display: block !important; } 
        }
    </style>
</head>
<body>

<div class="premium-card">
    <div id="form-content">
        <header>
            <img src="https://raw.githubusercontent.com/gestaob6cbax/agendamento-odonto-cbax/main/logo_odonto.png">
            <h2>Agendamento Odontológico 2026</h2>
            <p style="font-weight: bold; font-size: 0.7rem; color: #666;">CBA X - COMANDO DE BOMBEIROS DE ÁREA</p>
        </header>

        <div class="section-title">Bloco 1: Identificação</div>
        <label>Unidade de Origem</label>
        <select id="unidade">
            <option value="">Selecione sua Unidade...</option>
            <option>CBA X</option><option>1º GMAR</option><option>2º GMAR</option><option>3º GMAR</option>
            <option>4º GMAR</option><option>GBS</option><option>DBM 1/M</option><option>DBM 2/M</option>
            <option>DBM 3/M</option><option>DBM 4/M</option><option>DBM 5/M</option><option>DBM 6/M</option>
        </select>

        <label>Posto / Graduação</label>
        <select id="posto">
            <option value="">Selecione...</option>
            <option>SD</option><option>CB</option><option>3º SGT</option><option>2º SGT</option><option>1º SGT</option>
            <option>SUBTEN</option><option>TEN</option><option>CAP</option><option>MAJ</option><option>TC</option><option>CEL</option>
        </select>
        
        <label>Nome Completo</label>
        <input type="text" id="nome" placeholder="NOME COMPLETO" oninput="this.value = this.value.toUpperCase()">
        
        <label>RG Militar</label>
        <input type="number" id="rg" placeholder="Somente números">
        
        <label>Telefone / WhatsApp</label>
        <input type="tel" id="telefone" placeholder="(XX) 9XXXX-XXXX">

        <div class="section-title">Bloco 2: Agendamento</div>
        <label>Escolha a Data</label>
        <input type="date" id="data">

        <label>Turno</label>
        <select id="turno">
            <option value="">Selecione o Turno...</option>
            <option value="Manhã">Manhã (08:00 às 12:00)</option>
            <option value="Tarde">Tarde (13:00 às 17:00)</option>
        </select>

        <button id="btnSalvar" class="btn-confirmar" onclick="salvar()">Confirmar Agendamento</button>
    </div>

    <div id="sucesso">
        <header>
            <img src="https://raw.githubusercontent.com/gestaob6cbax/agendamento-odonto-cbax/main/logo_odonto.png">
            <h2>Agendamento Confirmado!</h2>
        </header>
        <div class="caixa-confirmacao">
            <div class="nome-militar" id="res-nome"></div>
            <div style="font-size: 0.85rem; margin-top: 10px; line-height: 1.6;">
                RG: <span id="res-rg" style="font-weight:bold;"></span><br>
                Data: <span id="res-data" style="font-weight:bold;"></span><br>
                Turno: <span id="res-turno" style="font-weight:bold;"></span>
            </div>
        </div>
        <button class="btn-confirmar" style="background:#555" onclick="window.print()">🖨️ IMPRIMIR COMPROVANTE</button>
        <span class="link-outro" onclick="location.reload()">Novo Agendamento</span>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY", 
        authDomain: "agendamento-odonto-cbax.firebaseapp.com", 
        projectId: "agendamento-odonto-cbax", 
        storageBucket: "agendamento-odonto-cbax.firebasestorage.app", 
        messagingSenderId: "1011281662526", 
        appId: "1:1011281662526:web:1028e8a8d140684e98376f" 
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function salvar() {
        const dados = {
            unidade: document.getElementById("unidade").value,
            posto: document.getElementById("posto").value,
            nome: document.getElementById("nome").value,
            rg: document.getElementById("rg").value,
            telefone: document.getElementById("telefone").value,
            data: document.getElementById("data").value.split('-').reverse().join('/'),
            turno: document.getElementById("turno").value,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        if(!dados.nome || !dados.rg || !dados.data || !dados.turno) {
            return alert("Preencha todos os campos obrigatórios!");
        }

        try {
            await db.collection("agendamentos_odonto").add(dados);
            
            document.getElementById("form-content").style.display = "none";
            document.getElementById("sucesso").style.display = "block";
            document.getElementById("res-nome").innerText = dados.nome;
            document.getElementById("res-rg").innerText = dados.rg;
            document.getElementById("res-data").innerText = dados.data;
            document.getElementById("res-turno").innerText = dados.turno;
        } catch (e) {
            alert("Erro ao salvar: " + e.message);
        }
    }
</script>
</body>
</html>
