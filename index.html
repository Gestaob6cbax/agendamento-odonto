<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Agendamento Odonto Inspeção 2026 - CBAX</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; background:#f2f4f8; margin:0; }
header { background:#0a2c6d; color:white; text-align:center; padding:25px; }
.container { background:white; max-width:900px; margin:30px auto; padding:25px; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
label { font-weight:bold; margin-top:15px; display:block; }
input, select { width:100%; padding:8px; margin-top:5px; }
button { margin-top:25px; padding:12px; background:#c00000; color:white; border:none; width:100%; font-size:16px; cursor:pointer; }
button:hover { background:#900000; }
.confirmacao { background:#e6ffe6; padding:20px; margin-top:20px; border-radius:8px; display:none; }
</style>
</head>

<body>

<header>
<img src="logo.png">
<h1>Agendamento Odontológico 2026</h1>
<p>CBA X - Salvamento Marítimo</p>
</header>

<div class="container">

<label>Unidade em que Serve:</label>
<select id="unidadeServe">
<option value="">Selecione</option>
<option>1º GMAR (Botafogo)</option>
<option>2º GMAR (Barra da Tijuca)</option>
<option>3º GMAR (Copacabana)</option>
<option>4º GMAR (Itaipu)</option>
<option>CER</option>
</select>

<label>Posto/Graduação:</label>
<select id="posto">
<option value="">Selecione</option>
<option>CEL BM</option>
<option>TC BM</option>
<option>MAJ BM</option>
<option>CAP BM</option>
<option>1º TEN BM</option>
<option>2º TEN BM</option>
<option>SUBTEN BM</option>
<option>1º SGT BM</option>
<option>2º SGT BM</option>
<option>3º SGT BM</option>
<option>CB BM</option>
<option>SD BM</option>
</select>

<label>Nome Completo:</label>
<input type="text" id="nome">

<label>RG:</label>
<input type="text" id="rg">

<label>Telefone:</label>
<input type="text" id="telefone">

<label>Email:</label>
<input type="email" id="email">

<hr>

<label>Unidade de Atendimento:</label>
<select id="unidade">
<option value="1GMAR">1º GMAR - BOTAFOGO</option>
<option value="2GMAR">2º GMAR - BARRA</option>
<option value="3GMAR">3º GMAR - COPACABANA</option>
<option value="4GMAR">4º GMAR - ITAIPU</option>
</select>

<label>Data:</label>
<input type="text" id="data" placeholder="Ex: 18/03/26">

<label>Horário:</label>
<input type="text" id="horario" placeholder="Ex: 08:30">

<button onclick="salvar()">Confirmar Agendamento</button>

<div class="confirmacao" id="confirmacaoBox"></div>

</div>

<script>

const { jsPDF } = window.jspdf;

const firebaseConfig = {
apiKey: "AIzaSyD3Z8mJPvGrRzwpYLymAXYcRQat2ccUqVM",
authDomain: "agendamento-odonto-cbax.firebaseapp.com",
projectId: "agendamento-odonto-cbax",
storageBucket: "agendamento-odonto-cbax.firebasestorage.app",
messagingSenderId: "545212689993",
appId: "1:545212689993:web:b4b85a03bb2dcac9739998"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function salvar(){

let rg = document.getElementById("rg").value.trim();

if(!rg){
alert("Informe o RG.");
return;
}

const consulta = await db.collection("agendamentos").where("rg","==",rg).get();

if(!consulta.empty){
alert("Já existe agendamento para este RG.");
return;
}

let dados={
unidadeServe:document.getElementById("unidadeServe").value,
posto:document.getElementById("posto").value,
nome:document.getElementById("nome").value,
rg:rg,
telefone:document.getElementById("telefone").value,
email:document.getElementById("email").value,
unidade:document.getElementById("unidade").value,
data:document.getElementById("data").value,
horario:document.getElementById("horario").value,
criadoEm:new Date()
};

await db.collection("agendamentos").add(dados);

mostrarConfirmacao(dados);
gerarPDF(dados);

}

function mostrarConfirmacao(d){
let box = document.getElementById("confirmacaoBox");
box.style.display="block";
box.innerHTML=`
<h3>Agendamento Confirmado</h3>
<p><strong>Nome:</strong> ${d.nome}</p>
<p><strong>RG:</strong> ${d.rg}</p>
<p><strong>Unidade:</strong> ${d.unidade}</p>
<p><strong>Data:</strong> ${d.data}</p>
<p><strong>Horário:</strong> ${d.horario}</p>
<p><strong>Salve ou imprima esta tela.</strong></p>
`;
}

function gerarPDF(d){

const doc = new jsPDF();

doc.setFontSize(14);
doc.text("CBAX - Salvamento Marítimo", 20, 20);
doc.text("Confirmação de Agendamento - 2026", 20, 30);

doc.setFontSize(12);
doc.text("Nome: " + d.nome, 20, 50);
doc.text("RG: " + d.rg, 20, 60);
doc.text("Unidade: " + d.unidade, 20, 70);
doc.text("Data: " + d.data, 20, 80);
doc.text("Horário: " + d.horario, 20, 90);

doc.save("confirmacao_agendamento_cbax_2026.pdf");

}

</script>

</body>
</html>
