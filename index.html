<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agendamento Odontológico 2026 - CBA X</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

:root{
--odonto-main:#009688;
--cba-blue:#0a2c6d;
--bg-light:#f1f4f8;
}

body{
font-family:'Segoe UI',Tahoma,sans-serif;
background:var(--bg-light);
margin:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:15px;
}

.container{
background:white;
width:100%;
max-width:550px;
border-radius:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
overflow:hidden;
border:1px solid #ddd;
padding-bottom:30px;
}

header{text-align:center;padding:25px 15px;}
header img{width:75px;margin-bottom:10px;}
header h1{color:var(--cba-blue);margin:0;font-size:1.5rem;}

.block-header{
background:var(--odonto-main);
color:white;
padding:12px;
text-align:center;
font-weight:bold;
font-size:0.85rem;
margin:10px 15px;
border-radius:8px;
}

.form-section{padding:0 20px;}

label{
display:block;
margin-top:15px;
font-weight:bold;
font-size:0.8rem;
color:#444;
}

input,select{
width:100%;
padding:11px;
margin-top:5px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
background:#fafafa;
}

button#btnAcao{
width:100%;
background:var(--odonto-main);
color:white;
padding:15px;
border:none;
border-radius:8px;
font-size:1.1rem;
font-weight:bold;
margin-top:25px;
cursor:pointer;
}

#areaComprovante{
display:none;
width:100%;
max-width:450px;
}

.comprovante-card{
background:white;
border-radius:30px;
padding:30px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
border-top:15px solid var(--odonto-main);
}

.nome-militar{
color:var(--cba-blue);
font-weight:bold;
font-size:1.3rem;
margin-bottom:20px;
display:block;
}

.info-linha{
display:flex;
gap:10px;
margin-bottom:12px;
}

.btn-pdf{
background:#555;
color:white;
border:none;
padding:15px;
width:100%;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.link-voltar{
color:var(--cba-blue);
cursor:pointer;
display:block;
margin-top:20px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container" id="containerForm">

<header>
<img src="logo.png">
<h1>Agendamento Odontológico</h1>
<p>CBA X - 6ª Seção - Gestão 2026</p>
</header>

<div class="block-header">Bloco 1: Identificação do Militar</div>

<div class="form-section">

<label>Unidade que Serve:</label>
<select id="unidadeServe">
<option value="">Selecione...</option>
<option>CBA X</option>
<option>CER X</option>
<option>1º GMAR (Botafogo)</option>
<option>2º GMAR (Barra da Tijuca)</option>
<option>3º GMAR (Copacabana)</option>
<option>4º GMAR (Itaipu)</option>
<option>DBM 1/M (Paquetá)</option>
<option>DBM 2/M (Piscinão de Ramos)</option>
<option>DBM 3/M (Recreio)</option>
<option>DBM 4/M (Barra de Guaratiba)</option>
<option>DBM 5/M (Sepetiba)</option>
<option>DBM 6/M (Itaipu)</option>
</select>

<label>Posto/Graduação:</label>
<select id="posto">
<option value="">Selecione...</option>
<option>CEL BM</option>
<option>TC BM</option>
<option>MAJ BM</option>
<option>CAP BM</option>
<option>1º TEN BM</option>
<option>2º TEN BM</option>
<option>SUBTEN BM</option>
<option>1º SGT BM</option>
<option>2º SGT BM</option>
<option>3º SGT BM</option>
<option>CB BM</option>
<option>SD BM</option>
</select>

<label>Nome Completo:</label>
<input type="text" id="nome" oninput="this.value=this.value.toUpperCase()">

<label>RG Militar:</label>
<input type="number" id="rg">

<label>WhatsApp:</label>
<input type="text" id="telefone">

<label>Email:</label>
<input type="email" id="email">

</div>

<div class="block-header">Bloco 2: Dados da Consulta</div>

<div class="form-section">

<label>Local da Inspeção:</label>
<select id="unidade" onchange="carregarDatas()">
<option value="">Selecione...</option>
<option value="1GMAR">1º GMAR - BOTAFOGO</option>
<option value="2GMAR">2º GMAR - BARRA</option>
<option value="3GMAR">3º GMAR - COPACABANA</option>
<option value="4º GMAR">CEPO-(CHARITAS)</option>
</select>

<label>Data Disponível:</label>
<select id="data" onchange="carregarHorarios()">
<option value="">Selecione</option>
</select>

<label>Horário:</label>
<select id="horario">
<option value="">Selecione</option>
</select>

<button onclick="salvar()" id="btnAcao">Confirmar Agendamento</button>

</div>
</div>

<script>

const firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"agendamento-odonto-cbax.firebaseapp.com",
projectId:"agendamento-odonto-cbax"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const datas={
"1GMAR":["11/03/2026","18/03/2026","25/03/2026"],
"2GMAR":["10/03/2026","17/03/2026","24/03/2026"],
"3GMAR":["10/03/2026","17/03/2026","24/03/2026"],
"4º GMAR":["10/04/2026","17/04/2026"]
};

function gerarHorarios(inicio,qtd){

let lista=[];
let hora=new Date("2000-01-01T"+inicio+":00");

for(let i=0;i<qtd;i++){

lista.push(hora.toTimeString().slice(0,5));
hora.setMinutes(hora.getMinutes()+15);

}

return lista;

}

function carregarDatas(){

let unidade=document.getElementById("unidade").value;
let selectData=document.getElementById("data");

selectData.innerHTML="<option value=''>Selecione</option>";

if(!unidade)return;

datas[unidade].forEach(d=>{

let op=document.createElement("option");
op.value=d;
op.text=d;
selectData.appendChild(op);

});

}

function carregarHorarios(){

let unidade=document.getElementById("unidade").value;
let selectHorario=document.getElementById("horario");

selectHorario.innerHTML="<option value=''>Selecione</option>";

let horarios=[];

if(unidade==="1GMAR")horarios=gerarHorarios("08:00",14);
if(unidade==="2GMAR")horarios=gerarHorarios("08:00",14);
if(unidade==="3GMAR")horarios=gerarHorarios("08:00",11);
if(unidade==="4º GMAR")horarios=gerarHorarios("08:00",13);

horarios.forEach(h=>{

let op=document.createElement("option");
op.value=h;
op.text=h;

selectHorario.appendChild(op);

});

}

async function salvar(){

let rg=document.getElementById("rg").value;
let nome=document.getElementById("nome").value;

let dataBR=document.getElementById("data").value;

if(!dataBR){
alert("Selecione a data");
return;
}

let partes=dataBR.split("/");

let dataISO=partes[2]+"-"+partes[1]+"-"+partes[0];

let dados={

nome:nome,
rg:rg,
data:dataBR,
dataISO:dataISO,
timestamp:firebase.firestore.FieldValue.serverTimestamp()

};

await db.collection("agendamentos_odonto").add(dados);

alert("Agendamento realizado");

}

</script>

</body>
</html>
