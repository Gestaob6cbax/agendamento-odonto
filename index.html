<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento Inspeção Médica 2026 - CBA X</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        :root { --admin-blue: #0a2c6d; --bombeiro-red: #c00000; }
        body { font-family: Arial, sans-serif; background: #f2f4f8; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        header { text-align: center; margin-bottom: 25px; }
        h2 { color: var(--admin-blue); text-transform: uppercase; font-size: 1.2rem; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #333; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { background: var(--admin-blue); color: white; border: none; padding: 15px; width: 100%; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 25px; font-size: 1rem; }
        button:hover { opacity: 0.9; }
        .success-box { display: none; text-align: center; padding: 20px; }
        .vagas-tag { font-size: 0.85rem; color: #666; font-weight: normal; }
    </style>
</head>
<body>

<div class="container" id="form-area">
    <header>
        <img src="logo.png" style="width: 80px;" alt="Logo CBAX" onerror="this.style.display='none';">
        <h2>Agendamento Inspeção Médica 2026</h2>
    </header>

    <label>Posto / Graduação:</label>
    <select id="posto">
        <option value="">Selecione...</option>
        <option>CORONEL</option><option>TENENTE CORONEL</option><option>MAJOR</option><option>CAPITÃO</option>
        <option>1º TENENTE</option><option>2º TENENTE</option><option>SUBTENENTE</option><option>1º SARGENTO</option>
        <option>2º SARGENTO</option><option>3º SARGENTO</option><option>CABO</option><option>SOLDADO</option>
    </select>

    <label>Nome Completo:</label>
    <input type="text" id="nome" placeholder="NOME COMPLETO">

    <label>RG Militar:</label>
    <input type="number" id="rg" placeholder="Apenas números">

    <label>Unidade de Origem:</label>
    <select id="unidadeServe">
        <option value="">Onde você serve?</option>
        <option>CBA X</option><option>1º GMAR</option><option>2º GMAR</option>
        <option>3º GMAR</option><option>4º GMAR</option>
    </select>

    <label>Local da Inspeção:</label>
    <select id="unidade">
        <option value="">Onde fará a inspeção?</option>
        <option value="1GMAR">1º GMAR - BOTAFOGO</option>
        <option value="2GMAR">2º GMAR - BARRA (GBS)</option>
        <option value="3GMAR">3º GMAR - COPACABANA</option>
        <option value="4GMAR">4º GMAR - ITAIPU (CEPO)</option>
    </select>

    <label>Data:</label>
    <input type="date" id="data">

    <label>Turno / Horário:</label>
    <select id="horario">
        <option value="">Selecione...</option>
        <option value="MANHÃ (08:00)">MANHÃ (08:00)</option>
        <option value="TARDE (13:00)">TARDE (13:00)</option>
    </select>

    <label>WhatsApp:</label>
    <input type="text" id="telefone" placeholder="(XX) XXXXX-XXXX">

    <label>E-mail:</label>
    <input type="email" id="email" placeholder="seu@email.com">

    <button onclick="salvar()">Confirmar Agendamento</button>
</div>

<div class="container success-box" id="success-area">
    <h2 style="color: green;">✅ Sucesso!</h2>
    <p>Seu agendamento foi registrado no sistema.</p>
    <p id="resumo"></p>
    <button onclick="location.reload()" style="background: #666;">Fazer novo agendamento</button>
</div>

<script>
    // USANDO AS MESMAS CREDENCIAIS DO SEU ADM
    const firebaseConfig = {
        apiKey: "AIzaSyD3Z8mJPvGrRzwpYLymAXYcRQat2ccUqVM",
        authDomain: "agendamento-odonto-cbax.firebaseapp.com",
        projectId: "agendamento-odonto-cbax",
        storageBucket: "agendamento-odonto-cbax.firebasestorage.app",
        messagingSenderId: "545212689993",
        appId: "1:545212689993:web:b4b85a03bb2dcac9739998"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function salvar() {
        const rg = document.getElementById('rg').value;
        const nome = document.getElementById('nome').value.toUpperCase();
        
        if(!rg || !nome || !document.getElementById('unidade').value) {
            return alert("Por favor, preencha os campos obrigatórios (Nome, RG e Local).");
        }

        const dados = {
            nome: nome,
            rg: rg,
            posto: document.getElementById('posto').value,
            unidadeServe: document.getElementById('unidadeServe').value, // Origem
            unidade: document.getElementById('unidade').value,           // Local Inspeção
            data: document.getElementById('data').value,
            horario: document.getElementById('horario').value,
            telefone: document.getElementById('telefone').value,
            email: document.getElementById('email').value,
            timestamp: new Date()
        };

        try {
            // Verifica se o RG já agendou
            const query = await db.collection("agendamentos").where("rg", "==", rg).get();
            if(!query.empty) {
                return alert("Este RG já possui um agendamento cadastrado!");
            }

            await db.collection("agendamentos").add(dados);
            
            document.getElementById('form-area').style.display = 'none';
            document.getElementById('success-area').style.display = 'block';
            document.getElementById('resumo').innerHTML = `<b>Militar:</b> ${dados.nome}<br><b>Local:</b> ${dados.unidade}<br><b>Data:</b> ${dados.data}`;
            
        } catch (e) {
            alert("Erro ao salvar: " + e.message);
        }
    }
</script>
</body>
</html>
