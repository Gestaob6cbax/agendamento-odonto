<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento Odontológico 2026 - CBA X</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --odonto-green: #009688; 
            --cba-blue: #0a2c6d;
            --bg-light: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 550px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 8px solid var(--odonto-green);
        }

        header { text-align: center; margin-bottom: 25px; }
        header img { width: 80px; margin-bottom: 10px; }
        header h1 { color: var(--cba-blue); font-size: 1.4rem; margin: 0; }

        h2 { 
            font-size: 1rem; 
            color: var(--odonto-green); 
            border-bottom: 1px solid #eee; 
            padding-bottom: 5px; 
            margin-top: 25px; 
            text-transform: uppercase;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            font-size: 0.85rem;
            color: #444;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 2px solid #eee;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--odonto-green); }

        button {
            width: 100%;
            background: var(--odonto-green);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 30px;
            cursor: pointer;
        }

        button:hover { background: #00796b; }

        .confirmacao {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            text-align: center;
            font-weight: bold;
        }

        .btn-print {
            background-color: var(--cba-blue);
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
   <header>
    <img src="logo.png" alt="Logo CBA X">
    <h1>Agendamento Odontológico</h1>
    <p>CBA X - Gestão 2026</p>
</header>

    <h2>Dados do Militar</h2>

    <label>Unidade que Serve:</label>
    <select id="unidadeServe">
        <option value="">Selecione</option>
        <option>CBA X</option>
        <option>CER X</option>
        <option>1º GMAR (Botafogo)</option>
        <option>2º GMAR (Barra da Tijuca)</option>
        <option>3º GMAR (Copacabana)</option>
        <option>4º GMAR (Itaipu)</option>
        <option>DBM 1/M (Paquetá)</option>
        <option>DBM 2/M (Piscinão de Ramos)</option>
        <option>DBM 3/M (Recreio)</option>
        <option>DBM 4/M (Barra de Guaratiba)</option>
        <option>DBM 5/M (Sepetiba)</option>
        <option>DBM 6/M (Itaipu)</option>
    </select>

    <label>Posto/Graduação:</label>
    <select id="posto">
        <option value="">Selecione</option>
        <option>CEL BM</option>
        <option>TC BM</option>
        <option>MAJ BM</option>
        <option>CAP BM</option>
        <option>1º TEN BM</option>
        <option>2º TEN BM</option>
        <option>SUBTEN BM</option>
        <option>1º SGT BM</option>
        <option>2º SGT BM</option>
        <option>3º SGT BM</option>
        <option>CB BM</option>
        <option>SD BM</option>
    </select>

    <label>Nome Completo:</label>
    <input type="text" id="nome" placeholder="Digite seu nome">

    <label>RG:</label>
    <input type="number" id="rg" placeholder="Somente números">

    <label>Telefone:</label>
    <input type="text" id="telefone" placeholder="(XX) XXXXX-XXXX">

    <label>Email:</label>
    <input type="email" id="email" placeholder="exemplo@email.com">

    <h2>Agendamento</h2>

    <label>Unidade de Atendimento (Polo):</label>
    <select id="unidade">
        <option value="">Selecione</option>
        <option value="1º GMAR - BOTAFOGO">1º GMAR - BOTAFOGO</option>
        <option value="2º GMAR - BARRA (GBS)">2º GMAR - BARRA (GBS)</option>
        <option value="3º GMAR - COPACABANA">3º GMAR - COPACABANA</option>
        <option value="4º GMAR - ITAIPU (CEPO)">4º GMAR - ITAIPU (CEPO)</option>
    </select>

    <label>Data:</label>
    <input type="date" id="data">

    <label>Horário/Turno:</label>
    <select id="horario">
        <option value="">Selecione</option>
        <option>MANHÃ (08:00 às 12:00)</option>
        <option>TARDE (13:00 às 17:00)</option>
    </select>

    <button onclick="salvar()" id="btnAcao">Confirmar Agendamento</button>

    <div id="confirmacaoBox" class="confirmacao"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
        authDomain: "agendamento-odonto-cbax.firebaseapp.com",
        projectId: "agendamento-odonto-cbax",
        storageBucket: "agendamento-odonto-cbax.firebasestorage.app",
        messagingSenderId: "1011281662526",
        appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Variável para armazenar dados para a impressão
    let dadosParaImpressao = null;

    async function salvar() {
        const btn = document.getElementById("btnAcao");
        const box = document.getElementById("confirmacaoBox");

        const dados = {
            unidadeServe: document.getElementById("unidadeServe").value,
            posto: document.getElementById("posto").value,
            nome: document.getElementById("nome").value.toUpperCase(),
            rg: document.getElementById("rg").value,
            telefone: document.getElementById("telefone").value,
            email: document.getElementById("email").value,
            poloAtendimento: document.getElementById("unidade").value,
            data: document.getElementById("data").value,
            turno: document.getElementById("horario").value,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        if (!dados.nome || !dados.rg || !dados.data || !dados.unidadeServe || !dados.poloAtendimento) {
            alert("Por favor, preencha todos os campos obrigatórios.");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Processando...";

        try {
            await db.collection("agendamentos_odonto").add(dados);
            dadosParaImpressao = dados;
            
            box.style.display = "block";
            box.style.backgroundColor = "#d4edda";
            box.style.color = "#155724";
            box.innerHTML = `
                <p>✅ Agendamento realizado com sucesso!</p>
                <button class="btn-print" onclick="imprimirComprovante()">🖨️ Imprimir Comprovante</button>
            `;
            
            btn.style.display = "none";
        } catch (error) {
            console.error(error);
            alert("Erro ao salvar. Verifique sua conexão.");
            btn.disabled = false;
            btn.innerText = "Confirmar Agendamento";
        }
    }

   function imprimirComprovante() {
    if(!dadosParaImpressao) return;
    
    const dataFormatada = dadosParaImpressao.data.split('-').reverse().join('/');
    const win = window.open('', '', 'height=700,width=700');
    
    win.document.write(`
        <html>
        <head>
            <title>Comprovante Odonto</title>
            <style>
                body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 40px; text-align: center; color: #333; }
                .header { border-bottom: 2px solid #0a2c6d; padding-bottom: 10px; margin-bottom: 20px; }
                .titulo { font-size: 20px; font-weight: bold; text-transform: uppercase; margin: 10px 0; color: #0a2c6d; }
                .sessao-txt { font-weight: bold; font-size: 14px; margin-bottom: 20px; color: #555; }
                .box { text-align: left; border: 1px solid #ccc; padding: 20px; border-radius: 12px; margin-top: 20px; background-color: #f9f9f9; }
                .info-label { font-weight: bold; color: #555; text-transform: uppercase; font-size: 0.8rem; }
                .info-valor { font-size: 1.1rem; margin-bottom: 10px; display: block; }
                hr { border: 0; border-top: 1px dashed #ccc; margin: 15px 0; }
                .footer { margin-top: 40px; font-size: 12px; color: #777; line-height: 1.5; }
                @media print {
                    body { padding: 20px; }
                    button { display: none; }
                }
            </style>
        </head>
        <body>
            <div class="header">
                <img src="logo.png" width="80" alt="Logo">
                <div class="titulo">Comprovante de Agendamento Odontológico</div>
                <div class="sessao-txt">CBA X - 6ºSEÇÃO</div>
            </div>
            
            <div class="box">
                <span class="info-label">Dados do Militar:</span>
                <span class="info-valor">${dadosParaImpressao.posto} ${dadosParaImpressao.nome}</span>
                
                <span class="info-label">RG Militar:</span>
                <span class="info-valor">${dadosParaImpressao.rg}</span>
                
                <span class="info-label">Unidade de Origem:</span>
                <span class="info-valor">${dadosParaImpressao.unidadeServe}</span>
                
                <hr>
                
                <span class="info-label">Polo de Atendimento:</span>
                <span class="info-valor">${dadosParaImpressao.poloAtendimento}</span>
                
                <span class="info-label">Data e Turno:</span>
                <span class="info-valor">${dataFormatada} - ${dadosParaImpressao.turno}</span>
            </div>

            <div class="footer">
                <strong>Solicitação realizada em:</strong> ${new Date().toLocaleString('pt-BR')} <br>
                <em>Este é um comprovante digital gerado pela Sexta Seção. Realize o print ou imprima para apresentação.</em> <br>
                <strong>Compareça com 15 minutos de antecedência.</strong>
            </div>
        </body>
        </html>
    `);
    
    win.document.close();
    
    // Pequeno atraso para garantir que o logo.png seja renderizado antes da impressão
    setTimeout(() => {
        win.print();
    }, 500);
}
                
                <div class="box">
                    <p><span class="info-label">MILITAR:</span> ${dadosParaImpressao.posto} ${dadosParaImpressao.nome}</p>
                    <p><span class="info-label">RG:</span> ${dadosParaImpressao.rg}</p>
                    <p><span class="info-label">UNIDADE DE ORIGEM:</span> ${dadosParaImpressao.unidadeServe}</p>
                    <hr>
                    <p><span class="info-label">POLO DE ATENDIMENTO:</span> ${dadosParaImpressao.poloAtendimento}</p>
                    <p><span class="info-label">DATA:</span> ${dataFormatada}</p>
                    <p><span class="info-label">TURNO/HORÁRIO:</span> ${dadosParaImpressao.turno}</p>
                </div>

                <div class="footer">
                    Solicitação realizada em: ${new Date().toLocaleString('pt-BR')} <br>
                    <em>Compareça ao polo com 15 minutos de antecedência.</em>
                </div>
            </body>
            </html>
        `);
        
        win.document.close();
        win.print();
    }
</script>

</body>
</html>
