<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspeção Odontológica 2026 - CBA X</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --cba-blue: #0a2c6d; --cba-gold: #b8860b; --success: #1b5e20; --error: #b71c1c; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #e9ecef; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .premium-card { width: 100%; max-width: 480px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); border-top: 8px solid var(--cba-blue); }
        header { text-align: center; margin-bottom: 25px; }
        header img { width: 90px; }
        header h2 { color: var(--cba-blue); margin: 10px 0 5px; font-size: 1.3rem; text-transform: uppercase; }
        .section-title { background: var(--cba-blue); color: white; padding: 8px 15px; font-size: 0.75rem; font-weight: bold; border-radius: 5px; margin-top: 25px; text-transform: uppercase; }
        label { display: block; margin-top: 15px; font-weight: 700; color: #333; font-size: 0.75rem; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; margin-top: 6px; border: 2px solid #dfe4ea; border-radius: 10px; box-sizing: border-box; font-size: 16px; background-color: #f4f7f6; }
        .vagas-badge { margin-top: 10px; padding: 12px; border-radius: 10px; text-align: center; font-size: 0.9rem; font-weight: bold; display: none; border: 1px solid; }
        .btn-confirmar { background: linear-gradient(135deg, var(--cba-blue) 0%, #1545a2 100%); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 30px; font-size: 1.1rem; text-transform: uppercase; }
        
        #comprovante { display: none; border: 3px double var(--cba-blue); padding: 25px; border-radius: 10px; background: #fff; margin-top: 10px; }
        .comprovante-header { text-align: center; border-bottom: 2px solid var(--cba-blue); padding-bottom: 15px; margin-bottom: 20px; }
        .item-doc { margin-bottom: 12px; font-size: 1rem; border-bottom: 1px solid #eee; padding-bottom: 5px; color: #222; }
        .item-doc strong { color: var(--cba-blue); font-size: 0.8rem; display: block; }
        .btn-print { background: #333; color: white; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer; border: none; text-transform: uppercase; }
        
        @media print { body * { visibility: hidden; } #comprovante, #comprovante * { visibility: visible; } #comprovante { position: absolute; left: 0; top: 0; width: 100%; border: 2px solid #000; } .no-print { display: none !important; } }
    </style>
</head>
<body>

<div class="premium-card">
    <header id="main-header">
        <img src="https://raw.githubusercontent.com/Gestaob6cbax/INSPECAO-ODONTOLOGICA-CBA-X-2026/main/logo.png" alt="CBA X">
        <h2>Agendamento 2026</h2>
        <p>ODONTOLOGIA - CBA X</p>
    </header>

    <div id="form-content">
        <div class="section-title">Identificação do Militar</div>
        
        <label>Unidade de Origem (Onde trabalha)</label>
        <select id="unidadeOrigem">
            <option value="">Selecione sua unidade...</option>
            <option>CBA X (Comando de Área)</option>
            <option>1º GMAR (Botafogo)</option>
            <option>2º GMAR (Barra)</option>
            <option>3º GMAR (Copacabana)</option>
            <option>4º GMAR (Itaipu)</option>
            <option>DBM 1/M (Paquetá)</option>
            <option>DBM 2/M (Piscinão)</option>
            <option>DBM 3/M (Recreio)</option>
            <option>DBM 4/M (Guaratiba)</option>
            <option>DBM 5/M (Sepetiba)</option>
            <option>DBM 6/M (Piratiniga)</option>
        </select>

        <label>Posto / Graduação</label>
        <select id="posto">
            <option value="">Selecione...</option>
            <option>SD BM</option><option>CB BM</option><option>3º SGT BM</option><option>2º SGT BM</option><option>1º SGT BM</option><option>SUBTEN BM</option>
            <option>2º TEN BM</option><option>1º TEN BM</option><option>CAP BM</option><option>MAJ BM</option><option>TEN CEL BM</option><option>CEL BM</option>
        </select>

        <label>Nome Completo</label>
        <input type="text" id="nome" placeholder="NOME SEM ABREVIAÇÕES" oninput="this.value = this.value.toUpperCase()">

        <label>RG Militar</label>
        <input type="number" id="rg" placeholder="Somente números">

        <label>E-mail</label>
        <input type="email" id="email" placeholder="exemplo@email.com">

        <label>WhatsApp / Telefone</label>
        <input type="tel" id="telefone" placeholder="(21) 9XXXX-XXXX">

        <div class="section-title">Local e Data da Inspeção</div>
        
        <label>Local de Destino (Onde fará a inspeção)</label>
        <select id="unidadeDestino" onchange="atualizarDatas()">
            <option value="">Escolha para onde deseja ir...</option>
            <option value="1GMAR">1º GMAR - BOTAFOGO</option>
            <option value="2GMAR">2º GMAR - BARRA(GBS - ATÉ A INAUGURAÇÃO DA UNIDADE)</option>
            <option value="3GMAR">3º GMAR - COPACABANA</option>
            <option value="4GMAR">4º GMAR - ITAIPU(CEPO)</option>
        </select>

        <label>Data Disponível</label>
        <select id="data" onchange="checarVagas()" disabled>
            <option value="">Selecione o local primeiro...</option>
        </select>
        <div id="statusVagas" class="vagas-badge"></div>

        <label>Horário</label>
        <select id="horario" disabled><option value="">Selecione o dia...</option></select>

        <button id="btnSalvar" class="btn-confirmar" onclick="salvarAgendamento()">Confirmar Agendamento</button>
    </div>

    <div id="comprovante">
        <div class="comprovante-header">
            <img src="https://raw.githubusercontent.com/Gestaob6cbax/INSPECAO-ODONTOLOGICA-CBA-X-2026/main/logo.png" style="width:60px"><br>
            <strong>CBA X - COMANDO DE BOMBEIROS DE ÁREA</strong><br>
            <h3 style="margin:10px 0; color:var(--cba-blue)">COMPROVANTE DE AGENDAMENTO</h3>
        </div>
        <div id="resumo-dados"></div>
        <button class="btn-print no-print" onclick="window.print()">🖨️ IMPRIMIR / SALVAR PDF</button>
        <button class="btn-print no-print" style="background:#666" onclick="location.reload()">VOLTAR</button>
    </div>
</div>

<script>
// Dados do Firebase mantidos conforme sua configuração
const firebaseConfig = { apiKey: "AIzaSyD3Z8mJPvGrRzwpYLymAXYcRQat2ccUqVM", authDomain: "agendamento-odonto-cbax.firebaseapp.com", projectId: "agendamento-odonto-cbax", storageBucket: "agendamento-odonto-cbax.firebasestorage.app", messagingSenderId: "545212689993", appId: "1:545212689993:web:b4b85a03bb2dcac9739998" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Configuração de datas por unidade
const agendaConfig = {
    "1GMAR": { datas: ["11/03/2026", "18/03/2026", "25/03/2026"], horarios: ["08:00", "08:15", "08:30", "08:45", "09:00"] },
    "2GMAR": { datas: ["10/03/2026", "17/03/2026", "24/03/2026"], horarios: ["08:00", "08:15", "08:30", "08:45", "09:00"] },
    "3GMAR": { datas: ["10/03/2026", "17/03/2026"], horarios: ["08:00", "08:15", "08:30"] },
    "4GMAR": { datas: ["10/04/2026", "17/04/2026"], horarios: ["08:00", "08:15", "08:30"] }
};

function atualizarDatas() {
    const local = document.getElementById("unidadeDestino").value;
    const campoData = document.getElementById("data");
    campoData.innerHTML = '<option value="">Selecione o dia...</option>';
    if (local) { campoData.disabled = false; agendaConfig[local].datas.forEach(d => campoData.innerHTML += `<option value="${d}">${d}</option>`); }
}

async function checarVagas() {
    const local = document.getElementById("unidadeDestino").value;
    const dataSel = document.getElementById("data").value;
    const badge = document.getElementById("statusVagas");
    badge.style.display = "block"; badge.innerText = "🔍 Consultando...";
    const snapshot = await db.collection("agendamentos").where("unidadeDestino", "==", local).where("data", "==", dataSel).get();
    const ocupados = snapshot.docs.map(doc => doc.data().horario);
    const disponiveis = agendaConfig[local].horarios.filter(h => !ocupados.includes(h));
    const campoHora = document.getElementById("horario");
    campoHora.innerHTML = '<option value="">Escolha o horário...</option>';
    if (disponiveis.length > 0) {
        disponiveis.forEach(h => campoHora.innerHTML += `<option value="${h}">${h}</option>`);
        campoHora.disabled = false; badge.innerText = `✅ ${disponiveis.length} vagas livres.`;
        badge.style.background = "#e8f5e9"; badge.style.color = "#1b5e20";
    } else { campoHora.disabled = true; badge.innerText = "❌ ESGOTADO!"; badge.style.background = "#ffebee"; badge.style.color = "#b71c1c"; }
}

async function salvarAgendamento() {
    const btn = document.getElementById('btnSalvar');
    const d = { 
        unidadeOrigem: document.getElementById('unidadeOrigem').value,
        posto: document.getElementById('posto').value, 
        nome: document.getElementById('nome').value.trim(), 
        rg: document.getElementById('rg').value.trim(), 
        email: document.getElementById('email').value.trim(),
        telefone: document.getElementById('telefone').value.trim(),
        unidadeDestino: document.getElementById('unidadeDestino').value, 
        data: document.getElementById('data').value, 
        horario: document.getElementById('horario').value 
    };

    if (Object.values(d).some(v => !v)) return alert("Preencha todos os campos!");
    btn.disabled = true;

    try {
        const check = await db.collection("agendamentos").where("rg", "==", d.rg).get();
        if (!check.empty) { btn.disabled = false; return alert("Este RG já possui um agendamento!"); }
        
        await db.collection("agendamentos").add({ ...d, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        
        document.getElementById('form-content').style.display = 'none';
        document.getElementById('main-header').style.display = 'none';
        document.getElementById('comprovante').style.display = 'block';
        
        document.getElementById('resumo-dados').innerHTML = `
            <div class="item-doc"><strong>UNIDADE DE ORIGEM:</strong> ${d.unidadeOrigem}</div>
            <div class="item-doc"><strong>MILITAR:</strong> ${d.posto} ${d.nome}</div>
            <div class="item-doc"><strong>RG:</strong> ${d.rg}</div>
            <div class="item-doc"><strong>LOCAL DA INSPEÇÃO:</strong> ${d.unidadeDestino}</div>
            <div class="item-doc"><strong>DATA E HORA:</strong> ${d.data} às ${d.horario}h</div>
        `;
    } catch (e) { alert("Erro ao salvar!"); btn.disabled = false; }
}
</script>
</body>
</html>
