<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento Odontológico 2026 - CBA X</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --odonto-blue: #0a2c6d; }
        body { font-family: Arial, sans-serif; background: #f2f4f8; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        h2 { color: var(--odonto-blue); text-transform: uppercase; font-size: 1.2rem; margin: 10px 0; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #333; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { background: var(--odonto-blue); color: white; border: none; padding: 15px; width: 100%; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 25px; font-size: 1rem; transition: 0.3s; }
        button:hover { background: #082152; }
        .success-box { display: none; text-align: center; padding: 20px; }
        .footer-logo { font-size: 0.8rem; color: #999; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container" id="form-area">
   <header>
    <img src="https://raw.githubusercontent.com/Gestaob6cbax/INSPECAO-ODONTOLOGICA-CBA-X-2026/main/logo.png" 
         style="width: 100px; height: auto; margin-bottom: 10px;" 
         alt="Logo CBA X">
    <h2>Agendamento Odontológico</h2>
    <p style="color: #666; font-size: 0.85rem; margin: 0;">Inspeção de Saúde - CBA X</p>
</header>
    <label>Posto / Graduação:</label>
    <select id="posto">
        <option value="">Selecione...</option>
        <option>CORONEL</option><option>TENENTE CORONEL</option><option>MAJOR</option><option>CAPITÃO</option>
        <option>1º TENENTE</option><option>2º TENENTE</option><option>SUBTENENTE</option>
        <option>1º SARGENTO</option><option>2º SARGENTO</option><option>3º SARGENTO</option>
        <option>CABO</option><option>SOLDADO</option>
    </select>

    <label>Nome Completo:</label>
    <input type="text" id="nome" placeholder="NOME SEM ABREVIAÇÕES">

    <label>RG Militar:</label>
    <input type="number" id="rg" placeholder="Ex: 12345">

    <label>Unidade de Origem (Onde você serve):</label>
    <select id="unidadeServe">
        <option value="">Selecione...</option>
        <option>CBA X</option><option>1º GMAR</option><option>2º GMAR</option>
        <option>3º GMAR</option><option>4º GMAR</option><option>DBM 1/M</option>
        <option>DBM 2/M</option><option>DBM 3/M</option><option>DBM 4/M</option>
        <option>DBM 5/M</option><option>DBM 6/M</option>
    </select>

    <label>Local do Atendimento (Destino):</label>
    <select id="unidade">
        <option value="">Selecione o local...</option>
        <option value="1GMAR">1º GMAR - BOTAFOGO</option>
        <option value="2GMAR">2º GMAR - BARRA (GBS)</option>
        <option value="3GMAR">3º GMAR - COPACABANA</option>
        <option value="4GMAR">4º GMAR - ITAIPU (CEPO)</option>
    </select>

    <label>Data:</label>
    <input type="date" id="data">

    <label>Horário:</label>
    <select id="horario">
        <option value="">Selecione...</option>
        <option>08:00</option><option>09:00</option><option>10:00</option>
        <option>11:00</option><option>13:00</option><option>14:00</option>
        <option>15:00</option>
    </select>

    <label>WhatsApp (Telefone):</label>
    <input type="text" id="telefone" placeholder="(XX) XXXXX-XXXX">

    <label>E-mail:</label>
    <input type="email" id="email" placeholder="militar@exemplo.com">

    <button onclick="salvar()">Confirmar Agendamento</button>
    <div class="footer-logo">CBA X - Comando de Bombeiros de Área</div>
</div>

<div class="container success-box" id="success-area">
    <h2 style="color: green;">✅ Confirmado!</h2>
    <p>Seu agendamento foi enviado para o Painel Administrativo.</p>
    <div id="resumo" style="text-align: left; background: #f9f9f9; padding: 15px; border-radius: 5px; margin-top: 15px; font-size: 0.9rem;"></div>
    <button onclick="location.reload()" style="background: #666;">Novo Agendamento</button>
</div>

<script>
    // CREDENCIAIS EXATAS DO SEU PROJETO ODONTO
    const firebaseConfig = {
        apiKey: "AIzaSyD3Z8mJPvGrRzwpYLymAXYcRQat2ccUqVM",
        authDomain: "agendamento-odonto-cbax.firebaseapp.com",
        projectId: "agendamento-odonto-cbax",
        storageBucket: "agendamento-odonto-cbax.firebasestorage.app",
        messagingSenderId: "545212689993",
        appId: "1:545212689993:web:b4b85a03bb2dcac9739998"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function salvar() {
        const rg = document.getElementById('rg').value;
        const nome = document.getElementById('nome').value.toUpperCase();
        const local = document.getElementById('unidade').value;
        const dataVal = document.getElementById('data').value;
        const horaVal = document.getElementById('horario').value;

        if(!rg || !nome || !local || !dataVal || !horaVal) {
            return alert("Atenção: Nome, RG, Local, Data e Horário são obrigatórios!");
        }

        const dados = {
            nome: nome,
            rg: rg,
            posto: document.getElementById('posto').value,
            unidadeServe: document.getElementById('unidadeServe').value, // Origem (badge-origem no ADM)
            unidade: local,                                            // Local (badge-local no ADM)
            data: dataVal.split('-').reverse().join('/'),               // Formata para DD/MM/AAAA
            horario: horaVal,
            telefone: document.getElementById('telefone').value,
            email: document.getElementById('email').value,
            timestamp: new Date()
        };

        try {
            // Verifica se o militar já agendou (Evita duplicidade)
            const query = await db.collection("agendamentos").where("rg", "==", rg).get();
            if(!query.empty) {
                return alert("ERRO: Este RG já possui um agendamento registrado!");
            }

            // Grava na coleção 'agendamentos' que o seu ADM lê
            await db.collection("agendamentos").add(dados);
            
            document.getElementById('form-area').style.display = 'none';
            document.getElementById('success-area').style.display = 'block';
            document.getElementById('resumo').innerHTML = `
                <b>Militar:</b> ${dados.posto} ${dados.nome}<br>
                <b>Local:</b> ${dados.unidade}<br>
                <b>Data/Hora:</b> ${dados.data} às ${dados.horario}
            `;
            
        } catch (e) {
            alert("Erro ao conectar com o servidor: " + e.message);
        }
    }
</script>
</body>
</html>
