<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel ADM - Agendamento Odontológico 2026</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { 
            --cba-red: #b71c1c; 
            --cba-blue: #0a2c6d; 
            --bg: #f0f2f5;
            --success: #27ae60;
            --warning: #f39c12;
            --odonto-color: #009688;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; }

        header { 
            background: white; padding: 20px 30px; border-radius: 15px; display: flex; 
            justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border-left: 10px solid var(--odonto-color); margin-bottom: 25px;
        }

        .header-info h1 { margin: 0; color: var(--cba-blue); font-size: 1.6rem; }
        .header-info p { margin: 5px 0 0; color: #666; font-weight: bold; font-size: 0.9rem; }

        /* CARDS ESTRATÉGICOS ODONTO */
        .card-destaque-geral {
            background: var(--odonto-color); color: white; padding: 20px; border-radius: 15px;
            text-align: center; box-shadow: 0 4px 15px rgba(0, 150, 136, 0.2); margin-bottom: 25px;
        }
        .card-destaque-geral h3 { margin: 0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .card-destaque-geral p { margin: 5px 0 0; font-size: 3rem; font-weight: 900; }

        .section-title { 
            font-size: 0.8rem; font-weight: bold; color: #555; 
            text-transform: uppercase; margin: 25px 0 10px 5px; 
            display: flex; align-items: center; gap: 10px;
        }
        .section-title::after { content: ""; flex: 1; height: 1px; background: #ddd; }

        .grid-cards { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; margin-bottom: 20px; 
        }
        
        .card-unidade { 
            background: white; padding: 15px; border-radius: 12px; text-align: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-bottom: 4px solid var(--cba-red); 
        }
        .card-unidade h4 { font-size: 0.65rem; color: #888; text-transform: uppercase; margin: 0; min-height: 30px; display: flex; align-items: center; justify-content: center; }
        .card-unidade p { font-size: 1.8rem; font-weight: bold; color: var(--cba-blue); margin: 5px 0 0; }
        /* -------------------------- */

        .controls-box { 
            background: white; padding: 20px; border-radius: 15px; display: flex; 
            gap: 15px; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); align-items: center;
        }
        #lupa { flex-grow: 1; padding: 12px 20px; border: 2px solid #eee; border-radius: 10px; outline: none; font-size: 1rem; }

        .btn { padding: 12px 20px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; gap: 8px; }
        .btn-refresh { background: var(--cba-blue); }
        .btn-excel { background: var(--success); }
        .btn-danger { background: var(--cba-red); }

        .table-container { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 15px; text-align: left; font-size: 0.7rem; text-transform: uppercase; color: #888; border-bottom: 2px solid #eee; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f1f1; font-size: 0.85rem; color: #333; }
        
        .btn-del { color: var(--cba-red); background: #ffebee; border: 1px solid #ffcdd2; padding: 6px; border-radius: 8px; cursor: pointer; }

        .import-box { background: #fff; padding: 25px; border-radius: 15px; margin-top: 40px; border: 2px dashed #ccc; }
        textarea { width: 100%; height: 100px; margin: 15px 0; padding: 15px; border-radius: 10px; border: 1px solid #ddd; font-family: monospace; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 20px;">
        <img src="https://raw.githubusercontent.com/gestaob6cbax/agendamento-odonto-cbax/main/logo_odonto.png" width="70">
        <div class="header-info">
            <h1>Gestão Odontológica</h1>
            <p>CBA X - COMANDO DE BOMBEIROS DE ÁREA X</p>
        </div>
    </div>
    <div style="display: flex; gap: 10px;">
        <button class="btn btn-excel" onclick="baixarPlanilha()">📥 Exportar Excel</button>
        <button class="btn btn-danger" onclick="resetarTudo()">⚠️ Resetar Banco</button>
    </div>
</header>

<div class="card-destaque-geral">
    <h3>Total de Agendamentos Odontológicos</h3>
    <p id="totalGeral">0</p>
</div>

<div class="section-title">Efetivo por Unidade (Origem)</div>
<div id="gridUnidades" class="grid-cards"></div>

<div class="controls-box">
    <input type="text" id="lupa" placeholder="🔍 Pesquise por Nome, RG ou Unidade..." onkeyup="filtrar()">
    <button class="btn btn-refresh" onclick="carregarDados()">🔄 Atualizar</button>
</div>

<div class="table-container">
    <table id="tabelaADM">
        <thead>
            <tr>
                <th>Data</th>
                <th>Turno</th>
                <th>Militar</th>
                <th>RG</th>
                <th>Origem</th>
                <th>Telefone</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="corpoTabela">
            <tr><td colspan="7" style="text-align:center; padding:40px;">Sincronizando...</td></tr>
        </tbody>
    </table>
</div>

<div class="import-box">
    <h3 style="margin:0; color: var(--warning);">📥 Importar Planilha (Excel)</h3>
    <p style="font-size: 0.8rem; color: #777;">Cole aqui as colunas do Excel para sincronizar agendamentos anteriores.</p>
    <textarea id="textoExcel" placeholder="Data | Turno | Nome | Posto | RG | Unidade | Telefone"></textarea>
    <button class="btn btn-refresh" style="width: 100%; justify-content: center; background: var(--success);" onclick="importarDados()">🚀 Sincronizar com Banco</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
        authDomain: "agendamento-odonto-cbax.firebaseapp.com",
        projectId: "agendamento-odonto-cbax",
        storageBucket: "agendamento-odonto-cbax.firebasestorage.app",
        messagingSenderId: "1011281662526",
        appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function carregarDados() {
        const corpo = document.getElementById("corpoTabela");
        corpo.innerHTML = '<tr><td colspan="7" style="text-align:center;">Carregando...</td></tr>';
        
        try {
            const snap = await db.collection("agendamentos_odonto").get();
            let lista = [];
            let unidadesMap = {};

            snap.forEach(doc => {
                const d = doc.data();
                lista.push({id: doc.id, ...d});
                let un = d.unidade || "N/I";
                unidadesMap[un] = (unidadesMap[un] || 0) + 1;
            });

            lista.sort((a,b) => b.timestamp - a.timestamp);

            let html = "";
            lista.forEach(d => {
                html += `<tr>
                    <td><b>${d.data}</b></td>
                    <td>${d.turno}</td>
                    <td>${d.posto} ${d.nome}</td>
                    <td><code>${d.rg}</code></td>
                    <td>${d.unidade}</td>
                    <td>${d.telefone || '-'}</td>
                    <td><button class="btn-del" onclick="excluirRegistro('${d.id}')">🗑️</button></td>
                </tr>`;
            });

            corpo.innerHTML = html || '<tr><td colspan="7" style="text-align:center;">Nenhum registro encontrado.</td></tr>';
            document.getElementById("totalGeral").innerText = lista.length;

            let uniHtml = "";
            Object.keys(unidadesMap).sort().forEach(un => {
                uniHtml += `<div class="card-unidade"><h4>${un}</h4><p>${unidadesMap[un]}</p></div>`;
            });
            document.getElementById("gridUnidades").innerHTML = uniHtml;

        } catch (e) { console.error(e); }
    }

    async function importarDados() {
        const texto = document.getElementById("textoExcel").value;
        if(!texto.trim()) return alert("Cole os dados!");
        const linhas = texto.split('\n');
        let contador = 0;

        for(let l of linhas) {
            if(!l.trim()) continue;
            const c = l.split('\t');
            if(c.length >= 5) {
                await db.collection("agendamentos_odonto").add({
                    data: c[0]?.trim(),
                    turno: c[1]?.trim(),
                    nome: c[2]?.trim().toUpperCase(),
                    posto: c[3]?.trim().toUpperCase(),
                    rg: c[4]?.trim(),
                    unidade: c[5]?.trim() || "CBA X",
                    telefone: c[6]?.trim() || "N/I",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                contador++;
            }
        }
        alert(`${contador} agendamentos sincronizados!`);
        document.getElementById("textoExcel").value = "";
        carregarDados();
    }

    async function excluirRegistro(id) {
        if(confirm("Excluir?")) {
            await db.collection("agendamentos_odonto").doc(id).delete();
            carregarDados();
        }
    }

    async function resetarTudo() {
        if(confirm("🚨 ZERAR TUDO?")) {
            const snap = await db.collection("agendamentos_odonto").get();
            const batch = db.batch();
            snap.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
            carregarDados();
        }
    }

    function baixarPlanilha() {
        const table = document.getElementById("tabelaADM");
        const wb = XLSX.utils.table_to_book(table);
        XLSX.writeFile(wb, "Relatorio_Odonto_2026.xlsx");
    }

    function filtrar() {
        const busca = document.getElementById("lupa").value.toUpperCase();
        const rows = document.querySelectorAll("#corpoTabela tr");
        rows.forEach(r => {
            r.style.display = r.innerText.toUpperCase().includes(busca) ? "" : "none";
        });
    }

    window.onload = carregarDados;
</script>
</body>
</html>
