<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM - Inspeção Odontológica 2026</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
            authDomain: "inspecao-saude-cbax.firebaseapp.com",
            projectId: "inspecao-saude-cbax",
            storageBucket: "inspecao-saude-cbax.firebasestorage.app",
            messagingSenderId: "1011281662526",
            appId: "1:1011281662526:web:1028e8a8d140684e98376f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let todosAgendamentos = [];

        const style = `
            body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 0; padding: 0; }
            .header { background: #0056b3; color: white; padding: 25px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
            .container { max-width: 1300px; margin: 20px auto; padding: 0 20px; }
            .stat-card { background: white; padding: 15px; border-radius: 10px; border-left: 6px solid #0056b3; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; width: fit-content; min-width: 200px; }
            .controls { background: white; padding: 15px; border-radius: 10px; display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
            select { padding: 10px; border-radius: 5px; border: 1px solid #ccc; flex-grow: 1; }
            .btn { padding: 10px 15px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
            .btn-danger { background: #dc3545; color: white; display: none; }
            .btn-print { background: #6c757d; color: white; }
            .table-container { background: white; border-radius: 10px; overflow-x: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
            table { width: 100%; border-collapse: collapse; }
            th { background: #f8f9fa; padding: 12px; text-align: left; font-size: 13px; border-bottom: 2px solid #dee2e6; }
            td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
            .badge { background: #e7f1ff; color: #0056b3; padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; }
            @media print { .header, .controls, .col-check, .col-del { display: none; } .container { max-width: 100%; } }
        `;

        const sheet = document.createElement('style'); sheet.innerHTML = style; document.head.appendChild(sheet);

        // BUSCA UNIVERSAL (Tenta agendamentos e agendamentos_odonto)
        const carregarDados = (colecao) => {
            onSnapshot(query(collection(db, colecao), orderBy("timestamp", "desc")), (snapshot) => {
                if (!snapshot.empty) {
                    todosAgendamentos = [];
                    snapshot.forEach((doc) => { todosAgendamentos.push({ id: doc.id, ...doc.data() }); });
                    window.renderizarTabela();
                }
            });
        };
        
        carregarDados("agendamentos"); // Tenta a primeira
        carregarDados("agendamentos_odonto"); // Tenta a segunda

        window.renderizarTabela = function() {
            const filtroLocal = document.getElementById("filtroLocal").value;
            const corpo = document.getElementById("corpoTabela");
            const filtrados = todosAgendamentos.filter(d => filtroLocal === "" || (d.local || d.localInspeção) === filtroLocal);

            corpo.innerHTML = "";
            filtrados.forEach(d => {
                // Aqui o código aceita qualquer nome de campo que você tenha usado antes
                const nomeMilitar = d.nome || d.Nome || "---";
                const postoMilitar = d.posto || d.graduacao || d.graduação || "---";
                const rgMilitar = d.rg || d.RG || "---";
                const localMilitar = d.local || d.localInspeção || "---";
                const dataMilitar = d.data || d.Data || "---";

                corpo.innerHTML += `
                    <tr>
                        <td class="col-check"><input type="checkbox" class="check-militar" value="${d.id}" onchange="toggleBotaoMassa()"></td>
                        <td><span class="badge">${localMilitar}</span></td>
                        <td>${dataMilitar}</td>
                        <td><strong>${nomeMilitar}</strong></td>
                        <td>${postoMilitar}</td>
                        <td>${rgMilitar}</td>
                        <td class="col-del"><button style="color:red; background:none; border:none; cursor:pointer;" onclick="excluirUm('${d.id}', '${nomeMilitar}')">🗑️</button></td>
                    </tr>`;
            });
            document.getElementById("contagem").innerText = filtrados.length;
        };

        window.excluirUm = async function(id, nome) {
            if (confirm(`Excluir agendamento de ${nome}?`)) {
                // Tenta excluir das duas coleções possíveis
                await deleteDoc(doc(db, "agendamentos", id)).catch(() => {});
                await deleteDoc(doc(db, "agendamentos_odonto", id)).catch(() => {});
            }
        };

        window.selecionarTudo = function() {
            const principal = document.getElementById("checkTodos").checked;
            document.querySelectorAll(".check-militar").forEach(cb => cb.checked = principal);
            window.toggleBotaoMassa();
        };

        window.toggleBotaoMassa = function() {
            const selecionados = document.querySelectorAll(".check-militar:checked").length;
            document.getElementById("btnDeletarVarios").style.display = selecionados > 0 ? "inline-block" : "none";
            document.getElementById("numSel").innerText = selecionados;
        };

        window.excluirSelecionados = async function() {
            const ids = Array.from(document.querySelectorAll(".check-militar:checked")).map(cb => cb.value);
            if (confirm(`Excluir ${ids.length} registros?`)) {
                for (const id of ids) {
                    await deleteDoc(doc(db, "agendamentos", id)).catch(() => {});
                    await deleteDoc(doc(db, "agendamentos_odonto", id)).catch(() => {});
                }
            }
        };
    </script>
</head>
<body>
    <div class="header"><h1>Painel ADM - Odontologia 2026</h1></div>
    <div class="container">
        <div class="stat-card"><span>Militares na Lista:</span> <strong id="contagem">0</strong></div>
        <div class="controls">
            <select id="filtroLocal" onchange="renderizarTabela()">
                <option value="">Todos os Locais</option>
                <option value="1GMAR">1º GMAR</option><option value="2GMAR">2º GMAR</option>
                <option value="3GMAR">3º GMAR</option><option value="4GMAR">4º GMAR</option>
            </select>
            <button id="btnDeletarVarios" class="btn btn-danger" onclick="excluirSelecionados()">Excluir Selecionados (<span id="numSel">0</span>)</button>
            <button class="btn btn-print" onclick="window.print()">🖨️ Imprimir</button>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th class="col-check"><input type="checkbox" id="checkTodos" onclick="selecionarTudo()"></th>
                        <th>Local</th><th>Data</th><th>Nome</th><th>Posto/Grad</th><th>RG</th><th class="col-del">Ação</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
    </div>
</body>
</html>
